  <text x="940" y="590" font-size="9" fill="#475569">/법무</text>
  <text x="956" y="606" font-size="9" fill="#475569">├ /2026</text>
  <text x="972" y="622" font-size="9" fill="#475569">│ ├ /CP사건</text>
