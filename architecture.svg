  <text x="338" y="358" font-size="9" fill="#475569">page</text>
  <text x="338" y="374" font-size="9" fill="#475569">selCat / selDoc</text>
  <text x="338" y="390" font-size="9" fill="#475569">search / filters</text>
  <text x="338" y="406" font-size="9" fill="#475569">sortCol / sortDir</text>
  <text x="338" y="422" font-size="9" fill="#475569">hideCompleted (토글)</text>
  <text x="338" y="438" font-size="9" fill="#475569">showDocModal</text>
  <text x="338" y="454" font-size="9" fill="#475569">showCaseInfoEdit</text>
  <text x="338" y="470" font-size="9" fill="#475569">aiLoading / chatLoading</text>

  <!-- DataAdapter -->
