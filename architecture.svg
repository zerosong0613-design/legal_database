  <text x="660" y="336" text-anchor="middle" font-size="10" font-weight="700" fill="#a16207">DataAdapter (DA)</text>
  <text x="538" y="356" font-size="9" fill="#475569">getDocs() / addDoc() / updateDoc()</text>
  <text x="538" y="372" font-size="9" fill="#475569">getCats() / addCat() / updateCat()</text>
  <text x="538" y="388" font-size="9" fill="#475569">getTags() / addTag() / deleteTag()</text>
  <text x="538" y="404" font-size="9" fill="#475569">getUsers() / updateUserRole()</text>
  <text x="538" y="420" font-size="9" fill="#475569">getDocMemo() / setDocMemo()</text>
  <text x="538" y="436" font-size="9" fill="#475569">getCaseNotes() / addCaseNote()</text>
  <text x="538" y="452" font-size="9" fill="#475569">getAISummary() / getChatHistory()</text>
  <rect x="540" y="462" width="242" height="16" rx="3" fill="#fef3c7"/>
  <text x="661" y="474" text-anchor="middle" font-size="8" font-weight="600" fill="#a16207">Phase1: localStorage / Phase2: SP REST API</text>

  <!-- Access Control -->
  <rect x="820" y="318" width="320" height="170" rx="8" fill="#fdf2f8" stroke="#fbcfe8"/>
  <text x="980" y="336" text-anchor="middle" font-size="10" font-weight="700" fill="#be185d">권한 제어</text>

  <rect x="838" y="348" width="90" height="48" rx="6" fill="#fee2e2" stroke="#fecaca"/>
  <text x="883" y="366" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626">관리자</text>
  <text x="883" y="383" text-anchor="middle" font-size="7" fill="#64748b">설정/동기화/사건관리</text>

  <rect x="938" y="348" width="90" height="48" rx="6" fill="#e0e7ff" stroke="#c7d2fe"/>
  <text x="983" y="366" text-anchor="middle" font-size="9" font-weight="700" fill="#4f46e5">편집자</text>
  <text x="983" y="383" text-anchor="middle" font-size="7" fill="#64748b">등록/수정/메모</text>

  <rect x="1038" y="348" width="90" height="48" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="1083" y="366" text-anchor="middle" font-size="9" font-weight="700" fill="#64748b">뷰어</text>
  <text x="1083" y="383" text-anchor="middle" font-size="7" fill="#64748b">조회/검색만</text>

  <text x="838" y="416" font-size="9" fill="#475569">currentUser() → CURRENT_USER_ID</text>
  <text x="838" y="432" font-size="9" fill="#475569">isAdmin() / canEdit()</text>
  <text x="838" y="448" font-size="9" fill="#475569">userName(userId) → 이름 조회</text>
  <text x="838" y="464" font-size="9" fill="#475569">SP: Azure AD 그룹 매핑</text>
  <text x="838" y="480" font-size="9" fill="#475569">SP: Person 필드 자동 연동</text>

