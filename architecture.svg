  <!-- SP Document Library -->
  <rect x="920" y="542" width="240" height="170" rx="10" fill="#fff" stroke="#0369a1" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="920" y="542" width="240" height="28" rx="10" fill="#0369a1"/>
