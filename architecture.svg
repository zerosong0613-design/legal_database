  <!-- Create flows -->
  <rect x="60" y="778" width="520" height="96" rx="6" fill="#f8fafc"/>
  <text x="78" y="796" font-size="10" font-weight="600" fill="#16a34a">생성 (Create)</text>

  <text x="78" y="814" font-size="8" fill="#475569">문서 등록</text>
  <text x="168" y="814" font-size="8" fill="#94a3b8">→ 모달 입력 → DA.addDoc() → SP 파일 업로드 + LKA_DocMeta</text>
  <text x="78" y="828" font-size="8" fill="#475569">사건/폴더 추가</text>
  <text x="168" y="828" font-size="8" fill="#94a3b8">→ 설정 입력 → DA.addCat() → SP 폴더 생성 + LKA_Categories</text>
  <text x="78" y="842" font-size="8" fill="#475569">메모 작성</text>
  <text x="168" y="842" font-size="8" fill="#94a3b8">→ 상세패널 → DA.setDocMemo() → LKA_DocMemos</text>
  <text x="78" y="856" font-size="8" fill="#475569">사건 메모 추가</text>
  <text x="168" y="856" font-size="8" fill="#94a3b8">→ 사건페이지 → DA.addCaseNote() → LKA_CaseNotes</text>
  <text x="78" y="870" font-size="8" fill="#475569">AI 메모/요약</text>
  <text x="168" y="870" font-size="8" fill="#94a3b8">→ Azure OpenAI → DA.setDocMemo() / DA.setAISummary()</text>

  <!-- Read/Update/Sync flows -->
  <rect x="600" y="778" width="540" height="96" rx="6" fill="#f8fafc"/>
  <text x="618" y="796" font-size="10" font-weight="600" fill="#3b82f6">조회/수정/동기화</text>

  <text x="618" y="814" font-size="8" fill="#475569">SP 동기화</text>
  <text x="708" y="814" font-size="8" fill="#94a3b8">→ Graph API delta → 변경분 반영 → DA.updateDoc()</text>
  <text x="618" y="828" font-size="8" fill="#475569">문서 수정</text>
  <text x="708" y="828" font-size="8" fill="#94a3b8">→ 수정모달 → DA.updateDoc() → LKA_DocMeta (SP 원본 미변경)</text>
  <text x="618" y="842" font-size="8" fill="#475569">사건정보 수정</text>
  <text x="708" y="842" font-size="8" fill="#94a3b8">→ 사건정보모달 → DA.updateCat() → LKA_Categories</text>
  <text x="618" y="856" font-size="8" fill="#475569">권한 변경</text>
  <text x="708" y="856" font-size="8" fill="#94a3b8">→ 설정 드롭다운 → DA.updateUserRole() → LKA_Users</text>
  <text x="618" y="870" font-size="8" fill="#dc2626" font-weight="600">삭제 불가</text>
  <text x="708" y="870" font-size="8" fill="#94a3b8">→ 문서/폴더는 SharePoint에서만 삭제 (원본 보호)</text>
</svg>
