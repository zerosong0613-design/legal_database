<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">법무 지식 아카이브 — 시스템 아키텍처</text>
  <text x="600" y="54" text-anchor="middle" font-size="11" fill="#94a3b8">Legal Knowledge Archive System Architecture</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 1: External Services (top) -->
  <!-- ═══════════════════════════════════════════ -->
  <text x="40" y="88" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="0.1em">EXTERNAL SERVICES</text>

  <!-- Azure AD -->
  <rect x="40" y="100" width="220" height="100" rx="10" fill="#fff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="100" width="220" height="28" rx="10" fill="#1e40af"/>
  <rect x="40" y="118" width="220" height="10" fill="#1e40af"/>
  <text x="150" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Microsoft Entra ID (Azure AD)</text>
  <text x="60" y="148" font-size="10" fill="#475569">SSO 인증 (OAuth 2.0)</text>
  <text x="60" y="163" font-size="10" fill="#475569">사용자/그룹 관리</text>
  <text x="60" y="178" font-size="10" fill="#475569">Person 필드 자동 매핑</text>
  <circle cx="230" cy="148" r="3" fill="#16a34a"/><text x="218" y="151" text-anchor="end" font-size="8" fill="#16a34a">SSO</text>

  <!-- SharePoint -->
  <rect x="300" y="100" width="340" height="100" rx="10" fill="#fff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="300" y="100" width="340" height="28" rx="10" fill="#0369a1"/>
  <rect x="300" y="118" width="340" height="10" fill="#0369a1"/>
  <text x="470" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">SharePoint Online</text>
  <text x="320" y="148" font-size="10" fill="#475569">문서 라이브러리 (파일 원본)</text>
  <text x="320" y="163" font-size="10" fill="#475569">폴더 구조 → 카테고리 매핑</text>
  <text x="320" y="178" font-size="10" fill="#475569">Graph API (Files.ReadWrite.All)</text>
  <rect x="530" y="140" width="90" height="18" rx="4" fill="#dcfce7"/>
  <text x="575" y="153" text-anchor="middle" font-size="8" font-weight="600" fill="#16a34a">파일 원본 보관</text>
  <rect x="530" y="162" width="90" height="18" rx="4" fill="#fef3c7"/>
  <text x="575" y="175" text-anchor="middle" font-size="8" font-weight="600" fill="#d97706">읽기/쓰기</text>

  <!-- Azure OpenAI -->
  <rect x="680" y="100" width="220" height="100" rx="10" fill="#fff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="680" y="100" width="220" height="28" rx="10" fill="#7c3aed"/>
  <rect x="680" y="118" width="220" height="10" fill="#7c3aed"/>
  <text x="790" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Azure OpenAI</text>
  <text x="700" y="148" font-size="10" fill="#475569">사건 요약 자동생성</text>
  <text x="700" y="163" font-size="10" fill="#475569">문서 메모 AI 작성</text>
  <text x="700" y="178" font-size="10" fill="#475569">사건별 AI 채팅</text>
  <circle cx="870" cy="148" r="3" fill="#7c3aed"/><text x="858" y="151" text-anchor="end" font-size="8" fill="#7c3aed">GPT-4o</text>

  <!-- Azure Doc Intelligence (optional) -->
  <rect x="940" y="100" width="220" height="100" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4" filter="url(#shadow)"/>
  <rect x="940" y="100" width="220" height="28" rx="10" fill="#94a3b8"/>
  <rect x="940" y="118" width="220" height="10" fill="#94a3b8"/>
  <text x="1050" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">AI Document Intelligence</text>
  <text x="960" y="148" font-size="10" fill="#94a3b8">PDF/DOCX 텍스트 추출</text>
  <text x="960" y="163" font-size="10" fill="#94a3b8">파일 내용 분석용</text>
  <text x="960" y="178" font-size="10" fill="#94a3b8">(향후 연동 예정)</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Connection arrows from services -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Azure AD → App -->
  <line x1="150" y1="200" x2="150" y2="270" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="158" y="240" font-size="8" fill="#3b82f6">토큰/사용자정보</text>

  <!-- SharePoint → App (bidirectional) -->
  <line x1="440" y1="200" x2="440" y2="270" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="500" y1="270" x2="500" y2="200" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="415" y="240" font-size="8" fill="#16a34a">동기화</text>
  <text x="507" y="240" font-size="8" fill="#16a34a">업로드</text>

  <!-- Azure OpenAI → App -->
  <line x1="790" y1="200" x2="790" y2="270" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="798" y="240" font-size="8" fill="#7c3aed">AI 분석/채팅</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 2: Application (middle) -->
  <!-- ═══════════════════════════════════════════ -->
  <text x="40" y="262" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="0.1em">APPLICATION LAYER</text>

  <!-- Main App Box -->
  <rect x="40" y="272" width="1120" height="230" rx="12" fill="#fff" stroke="#1e40af" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="272" width="1120" height="32" rx="12" fill="#1e40af"/>
  <rect x="40" y="294" width="1120" height="10" fill="#1e40af"/>
  <text x="600" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">법무 지식 아카이브 (Legal Knowledge Archive) — 단일 HTML + Vanilla JS</text>

  <!-- UI Components -->
  <rect x="60" y="318" width="240" height="170" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="180" y="336" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">UI 컴포넌트</text>
  <text x="78" y="356" font-size="9" fill="#475569">● 사이드바 (폴더 트리 + 네비)</text>
  <text x="78" y="372" font-size="9" fill="#475569">● 대시보드 (통계 + 팀활동)</text>
  <text x="78" y="388" font-size="9" fill="#475569">● 문서 목록 (폴더 그룹핑)</text>
  <text x="78" y="404" font-size="9" fill="#475569">● 문서 상세 패널</text>
  <text x="78" y="420" font-size="9" fill="#475569">● 사건 요약 페이지</text>
  <text x="78" y="436" font-size="9" fill="#475569">● 4섹션 메모 에디터</text>
  <text x="78" y="452" font-size="9" fill="#475569">● AI 채팅 / 모달 / 토스트</text>
  <text x="78" y="468" font-size="9" fill="#475569">● 설정 (SP/AI/사용자/카테고리/태그)</text>

