  <text x="648" y="681" font-size="8" fill="#64748b">태그 마스터</text>

  <rect x="478" y="690" width="160" height="18" rx="4" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="558" y="703" text-anchor="middle" font-size="8" font-weight="600" fill="#16a34a">LKA_Users</text>
