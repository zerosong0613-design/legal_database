  <!-- LAYER 4: Data Flow Legend (bottom) -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="40" y="740" width="1120" height="145" rx="10" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
