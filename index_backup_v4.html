<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>법무 지식 아카이브 (Legal Knowledge Archive)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:#f8fafc;color:#1e293b;font-size:13px;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

/* ── Layout ── */
.app{display:flex;min-height:100vh;}
.sidebar{width:260px;height:100vh;background:#fff;border-right:1px solid #e2e8f0;position:fixed;left:0;top:0;z-index:10;display:flex;flex-direction:column;overflow:hidden;transition:transform .2s;}
.main{margin-left:260px;flex:1;display:flex;flex-direction:column;min-width:0;}
.header{height:56px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:5;}
.content{padding:20px 24px;flex:1;}

/* ── Sidebar ── */
.logo{padding:14px 16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px;flex-shrink:0;transition:background .15s;}
.logo:hover{background:#f8fafc;}
.logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#0f172a,#1e40af);display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.logo-text{font-weight:700;font-size:13px;line-height:1.3;}
.logo-sub{font-size:10px;color:#94a3b8;font-weight:400;}
.sidebar-scroll{flex:1;overflow-y:auto;}
.nav{padding:8px 10px 4px;}
.nav-section-label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;padding:10px 10px 4px;}
.nav-item{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border:none;border-radius:6px;background:none;color:#475569;font-size:12px;text-align:left;margin-bottom:1px;}
.nav-item:hover{background:#f1f5f9;}
.nav-item.active{background:#eff6ff;color:#1e40af;font-weight:600;}
.nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.cat-label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;padding:10px 10px 4px;}
.cat-section{padding:2px 10px 6px;}
.cat-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:5px 10px;border:none;border-radius:6px;background:none;color:#475569;font-size:12px;text-align:left;}
.cat-item:hover{background:#f1f5f9;}
.cat-item.active{background:#e0e7ff;color:#1e40af;font-weight:600;}
.cat-item .count{font-size:10px;color:#94a3b8;background:#f1f5f9;padding:1px 6px;border-radius:8px;}
.cat-child{padding-left:14px;}
.sync-status{padding:10px 14px;border-top:1px solid #e2e8f0;font-size:10px;color:#94a3b8;flex-shrink:0;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#16a34a;display:inline-block;margin-right:4px;}

/* ── Header ── */
.breadcrumb{display:flex;align-items:center;gap:4px;font-size:12px;color:#64748b;}
.breadcrumb span{cursor:pointer;}
.breadcrumb span:hover{color:#1e40af;}
.breadcrumb .bc-sep{color:#cbd5e1;cursor:default;}
.breadcrumb .bc-current{color:#1e293b;font-weight:600;cursor:default;}
.header-right{display:flex;align-items:center;gap:10px;}
.search-box{position:relative;}
.search-box input{width:280px;padding:7px 10px 7px 32px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none;background:#f8fafc;}
.search-box input:focus{border-color:#93c5fd;background:#fff;}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);}
.btn-primary{padding:6px 14px;background:#1e40af;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:500;}
.btn-primary:hover{background:#1d4ed8;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-secondary{padding:6px 14px;background:#fff;color:#475569;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;font-weight:500;}
.btn-secondary:hover{background:#f8fafc;}
.btn-danger{padding:6px 14px;background:#fff;color:#dc2626;border:1px solid #fecaca;border-radius:6px;font-size:12px;font-weight:500;}
.btn-danger:hover{background:#fef2f2;}
.btn-icon{padding:5px;border:none;background:none;color:#94a3b8;border-radius:4px;}
.btn-icon:hover{background:#f1f5f9;color:#475569;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1e40af,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:11px;}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
.stat-card{padding:14px 16px;background:#fff;border-radius:8px;border:1px solid #e2e8f0;}
.stat-card .label{font-size:11px;color:#64748b;margin-bottom:4px;}
.stat-card .value{font-size:24px;font-weight:700;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.card{padding:16px;background:#fff;border-radius:8px;border:1px solid #e2e8f0;}
.card h3{font-size:12px;font-weight:700;margin-bottom:12px;color:#1e293b;}
.bar-row{margin-bottom:8px;}
.bar-row .bar-label{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px;}
.bar-row .bar-label span:last-child{font-weight:600;}
.bar-track{height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;background:#3b82f6;border-radius:2px;}
.sync-box{padding:12px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0;margin-bottom:12px;}
.sync-box .sync-title{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;font-weight:600;color:#16a34a;}
.sync-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sync-mini{padding:8px;background:#f8fafc;border-radius:6px;text-align:center;}
.sync-mini .num{font-size:16px;font-weight:700;color:#3b82f6;}
.sync-mini .txt{font-size:10px;color:#94a3b8;}
.recent-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;cursor:pointer;}
.recent-item:hover{background:#f8fafc;margin:0 -8px;padding:8px;}
.recent-item .title{font-size:12px;font-weight:500;}
.recent-item .date{font-size:10px;color:#94a3b8;white-space:nowrap;}

/* ── Filter bar ── */
.filter-bar{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.filter-bar select{padding:5px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;color:#475569;background:#fff;outline:none;}
.filter-bar select:focus{border-color:#93c5fd;}
.filter-divider{width:1px;height:18px;background:#e2e8f0;}
.tag-btn{padding:3px 8px;border-radius:12px;border:1px solid #e2e8f0;background:#fff;color:#475569;font-size:10px;font-weight:500;}
.tag-btn.active{background:#1e40af;color:#fff;border-color:#1e40af;}
.filter-count{flex:1;text-align:right;font-size:11px;color:#94a3b8;}
.filter-reset{font-size:11px;color:#3b82f6;cursor:pointer;text-decoration:underline;border:none;background:none;}

/* ── Table ── */
.doc-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;border:1px solid #e2e8f0;overflow:hidden;}
.doc-table th{padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:#64748b;background:#f8fafc;border-bottom:1px solid #e2e8f0;cursor:pointer;user-select:none;white-space:nowrap;}
.doc-table th:hover{background:#f1f5f9;}
.doc-table th .sort-arrow{font-size:9px;margin-left:2px;color:#cbd5e1;}
.doc-table th .sort-arrow.asc,.doc-table th .sort-arrow.desc{color:#1e40af;}
.doc-table td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.doc-table tr:hover td{background:#f8fafc;}
.doc-table tr{cursor:pointer;}
.doc-title-cell{display:flex;align-items:center;gap:8px;}
.file-icon{min-width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
.doc-title{font-weight:500;font-size:12px;margin-bottom:1px;}
.doc-tags{display:flex;gap:3px;flex-wrap:wrap;}
.tag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:500;}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap;}
.badge-doctype{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;}
.badge-importance-H{background:#fee2e2;color:#dc2626;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;}
.badge-importance-M{background:#fef3c7;color:#d97706;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;}
.badge-importance-L{background:#f1f5f9;color:#64748b;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;}
.badge-status-active{background:#dcfce7;color:#16a34a;}
.badge-status-review{background:#fef3c7;color:#d97706;}
.badge-status-ref{background:#f1f5f9;color:#64748b;}
.badge-status-archived{background:#e0e7ff;color:#4f46e5;}
.sp-link-btn{padding:3px 7px;border:1px solid #bfdbfe;border-radius:4px;background:#eff6ff;color:#1e40af;font-size:10px;white-space:nowrap;}
.sp-link-btn:hover{background:#dbeafe;}
.note-indicator{font-size:10px;color:#3b82f6;font-weight:500;}
.star-btn{border:none;background:none;cursor:pointer;font-size:14px;line-height:1;padding:0 2px;color:#cbd5e1;}
.star-btn:hover{color:#f59e0b;}
.star-btn.starred{color:#f59e0b;}
.empty-msg{padding:40px;text-align:center;color:#94a3b8;font-size:13px;}
.group-header td{background:#f8fafc!important;padding:6px 12px!important;border-bottom:1px solid #e2e8f0!important;cursor:pointer;}
.group-header:hover td{background:#f1f5f9!important;}
.group-header .gh-name{font-size:12px;font-weight:600;color:#1e293b;display:flex;align-items:center;gap:6px;}
.group-header .gh-count{font-size:10px;color:#94a3b8;font-weight:400;}
.group-parent td{background:#f1f5f9!important;padding:5px 12px!important;}
.group-parent .gp-name{font-size:11px;font-weight:700;color:#64748b;display:flex;align-items:center;gap:4px;}
.matter-cell{font-size:10px;color:#64748b;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:12px;}
.pagination button{padding:5px 10px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;font-size:11px;color:#475569;}
.pagination button:hover{background:#f1f5f9;}
.pagination button.active{background:#1e40af;color:#fff;border-color:#1e40af;}
.pagination button:disabled{opacity:.4;cursor:not-allowed;}
.table-checkbox{width:14px;height:14px;accent-color:#1e40af;cursor:pointer;}
.bulk-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;margin-bottom:10px;font-size:12px;color:#1e40af;}

/* ── Detail panel ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:15;}
.detail-panel{position:fixed;top:0;right:0;width:680px;max-width:90vw;height:100vh;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.08);z-index:20;display:flex;flex-direction:column;overflow:hidden;}
.detail-header{padding:14px 20px;border-bottom:1px solid #e2e8f0;flex-shrink:0;}
.detail-header-top{display:flex;align-items:flex-start;justify-content:space-between;}
.detail-header-left{display:flex;align-items:flex-start;gap:12px;flex:1;min-width:0;}
.close-btn{border:none;background:none;cursor:pointer;color:#94a3b8;padding:4px;font-size:18px;line-height:1;}
.close-btn:hover{color:#475569;}
.detail-info{padding:12px 20px;border-bottom:1px solid #e2e8f0;flex-shrink:0;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.info-item .il{font-size:9px;color:#94a3b8;margin-bottom:1px;text-transform:uppercase;letter-spacing:.04em;}
.info-item .iv{font-size:12px;font-weight:500;}
.sp-btn{padding:6px 12px;background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;border-radius:6px;font-size:11px;font-weight:500;margin-top:8px;margin-right:6px;}
.sp-btn:hover{background:#dbeafe;}
.detail-body{flex:1;overflow-y:auto;}
.detail-section{padding:14px 20px;border-bottom:1px solid #f1f5f9;}
.detail-section h4{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.note-tabs{display:flex;gap:2px;margin-bottom:10px;border-bottom:1px solid #e2e8f0;padding-bottom:0;}
.note-tab{padding:6px 12px;border:none;background:none;font-size:11px;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.note-tab.active{color:#1e40af;font-weight:600;border-bottom-color:#1e40af;}
.note-textarea{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none;font-family:inherit;resize:vertical;min-height:70px;background:#f8fafc;}
.note-textarea:focus{border-color:#93c5fd;background:#fff;}
.note-save-bar{display:flex;justify-content:flex-end;gap:6px;margin-top:6px;}
.memo-content{font-size:12px;color:#475569;line-height:1.7;white-space:pre-wrap;padding:10px 12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;min-height:50px;}
.memo-content.empty{color:#cbd5e1;font-style:italic;}
.related-doc-item{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:6px;border:1px solid #e2e8f0;margin-bottom:5px;cursor:pointer;}
.related-doc-item:hover{border-color:#93c5fd;background:#f0f9ff;}
.related-doc-item .rdi-title{font-size:11px;font-weight:500;}
.related-doc-item .rdi-meta{font-size:10px;color:#94a3b8;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:50;display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto;width:600px;max-width:95vw;}
.modal-header{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;}
.modal-header h2{font-size:15px;font-weight:700;}
.modal-body{padding:20px;}
.modal-footer{padding:14px 20px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:8px;}
.form-row{margin-bottom:12px;}
.form-row label{display:block;font-size:10px;font-weight:600;color:#475569;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;outline:none;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#93c5fd;}
.form-row textarea{resize:vertical;min-height:60px;font-family:inherit;}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.form-section-title{font-size:11px;font-weight:700;color:#64748b;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid #f1f5f9;}
.form-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.form-tag{padding:3px 8px;border-radius:12px;border:1px solid #e2e8f0;font-size:10px;cursor:pointer;background:#fff;}
.form-tag.selected{background:#1e40af;color:#fff;border-color:#1e40af;}
.form-parties{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.form-party{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#f1f5f9;border-radius:12px;font-size:11px;}
.form-party button{border:none;background:none;color:#94a3b8;font-size:12px;padding:0;cursor:pointer;}

/* ── Confirm Dialog ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:60;display:flex;align-items:center;justify-content:center;}
.confirm-box{background:#fff;border-radius:10px;padding:24px;width:380px;max-width:90vw;box-shadow:0 10px 40px rgba(0,0,0,.15);}
.confirm-box h3{font-size:14px;font-weight:700;margin-bottom:8px;}
.confirm-box p{font-size:12px;color:#64748b;margin-bottom:16px;line-height:1.6;}
.confirm-box .confirm-actions{display:flex;justify-content:flex-end;gap:8px;}

/* ── Toast ── */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:6px;}
.toast{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.1);animation:toastIn .3s ease;min-width:200px;}
.toast.success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
.toast.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
.toast.info{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ── Settings ── */
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid #e2e8f0;}
.tab-btn{padding:8px 16px;border:none;border-bottom:2px solid transparent;background:none;color:#64748b;font-size:12px;cursor:pointer;margin-bottom:-1px;}
.tab-btn.active{border-bottom-color:#1e40af;color:#1e40af;font-weight:600;}
.section{padding:16px 20px;background:#fff;border-radius:8px;border:1px solid #e2e8f0;margin-bottom:14px;}
.section h3{font-size:13px;font-weight:700;margin-bottom:12px;}
.info-box{margin-top:12px;padding:10px 12px;border-radius:8px;font-size:11px;line-height:1.6;}
.info-box.blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;}
.info-box.green{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;}
.info-box.amber{background:#fffbeb;border:1px solid #fde68a;color:#92400e;}
.folder-tree{border:1px solid #e2e8f0;border-radius:8px;padding:12px;max-height:280px;overflow-y:auto;background:#fafbfc;}
.folder-node{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:5px;cursor:pointer;font-size:11px;}
.folder-node:hover{background:#f1f5f9;}
.folder-node.selected{background:#eff6ff;color:#1e40af;font-weight:600;}
.folder-node .root-badge{font-size:8px;padding:1px 4px;border-radius:3px;background:#1e40af;color:#fff;margin-left:3px;}
.step-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.step-card{padding:12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;}
.step-num{width:24px;height:24px;border-radius:50%;background:#1e40af;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-bottom:6px;}
.step-card .st{font-size:12px;font-weight:600;margin-bottom:4px;}
.step-card .sd{font-size:10px;color:#64748b;line-height:1.5;}
.user-table{width:100%;border-collapse:collapse;}
.user-table th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:#64748b;background:#f8fafc;border-bottom:1px solid #e2e8f0;}
.user-table td{padding:8px 10px;font-size:11px;border-bottom:1px solid #f1f5f9;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.tag-manage{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;}
.tag-manage .dot{width:8px;height:8px;border-radius:2px;}
.tag-manage span{font-size:11px;font-weight:500;}
.tag-manage button{border:none;background:none;color:#94a3b8;font-size:13px;padding:0 0 0 2px;}
.tag-manage button:hover{color:#dc2626;}
.add-tag-row{display:flex;gap:6px;}
.add-tag-row input[type=text]{flex:1;padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;outline:none;}
.add-tag-row input[type=color]{width:34px;height:30px;border:1px solid #e2e8f0;border-radius:4px;cursor:pointer;padding:2px;}
.connected-status{margin-top:6px;display:flex;align-items:center;gap:6px;font-size:11px;color:#16a34a;}
.cat-manage-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;margin-bottom:4px;font-size:12px;}
.cat-manage-item .cat-depth{color:#94a3b8;margin-right:6px;}
.cat-manage-actions{display:flex;gap:4px;}

/* ── Case Summary ── */
.case-header{padding:18px;background:#fff;border-radius:8px;border:1px solid #e2e8f0;margin-bottom:14px;}
.case-header h2{font-size:16px;font-weight:700;margin-bottom:6px;}
.case-meta{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;}
.case-meta-item{font-size:11px;}
.case-meta-item .cml{color:#94a3b8;margin-right:4px;}
.case-summary-text{font-size:12px;color:#475569;line-height:1.7;white-space:pre-wrap;padding:12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;}
.timeline{position:relative;padding-left:24px;}
.timeline::before{content:'';position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:#e2e8f0;}
.tl-item{position:relative;margin-bottom:14px;}
.tl-dot{position:absolute;left:-20px;top:4px;width:10px;height:10px;border-radius:50%;border:2px solid #3b82f6;background:#fff;}
.tl-item.first .tl-dot{background:#3b82f6;}
.tl-date{font-size:10px;color:#94a3b8;margin-bottom:2px;}
.tl-card{padding:9px 12px;background:#fff;border-radius:8px;border:1px solid #e2e8f0;cursor:pointer;}
.tl-card:hover{border-color:#93c5fd;}
.tl-card .tl-title{font-size:11px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px;}
.tl-card .tl-desc{font-size:10px;color:#64748b;}
.key-notes{padding:16px 18px;background:#fff;border-radius:8px;border:1px solid #e2e8f0;margin-bottom:14px;}
.key-notes h3{font-size:12px;font-weight:700;margin-bottom:12px;}
.back-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;font-weight:500;margin-bottom:12px;}
.back-btn:hover{background:#e2e8f0;}
.note-card{padding:10px 12px;border-radius:8px;border:1px solid #e2e8f0;margin-bottom:6px;background:#f8fafc;}
.note-card.pinned{background:#fffbeb;border-color:#fde68a;}
.note-card .note-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.note-card .note-title{font-weight:600;font-size:11px;}
.note-card .note-date{font-size:9px;color:#94a3b8;}
.note-card .note-body{font-size:11px;color:#475569;line-height:1.6;white-space:pre-wrap;}
.note-card .note-author{margin-top:4px;font-size:9px;color:#94a3b8;}
.note-card .note-actions{display:flex;gap:4px;margin-left:8px;}
.search-highlight{background:#fef08a;padding:0 1px;border-radius:2px;}

/* ── Chat ── */
#chatMessages{max-height:320px;overflow-y:auto;margin-bottom:8px;}
.chat-msg{display:flex;gap:6px;margin-bottom:8px;}
.chat-msg.user{justify-content:flex-end;}
.chat-bubble{max-width:78%;padding:8px 12px;font-size:11px;line-height:1.6;white-space:pre-wrap;border-radius:10px;}
.chat-bubble.ai{background:#f1f5f9;color:#1e293b;border-radius:10px 10px 10px 2px;}
.chat-bubble.user{background:#1e40af;color:#fff;border-radius:10px 10px 2px 10px;}
.chat-avatar{min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;margin-top:2px;}
.chat-avatar.ai{background:linear-gradient(135deg,#6366f1,#8b5cf6);}
.chat-avatar.user{background:linear-gradient(135deg,#1e40af,#3b82f6);}
.chat-suggest{padding:4px 10px;border:1px solid #e2e8f0;border-radius:14px;background:#fff;font-size:10px;color:#475569;cursor:pointer;}
.chat-suggest:hover{background:#f1f5f9;}

/* ── Edit mode in detail ── */
.edit-field{display:flex;align-items:center;gap:6px;}
.edit-field select,.edit-field input{padding:4px 8px;border:1px solid #93c5fd;border-radius:4px;font-size:12px;outline:none;background:#eff6ff;}
.toggle{position:relative;width:36px;height:20px;background:#cbd5e1;border-radius:10px;cursor:pointer;transition:background .2s;border:none;padding:0;flex-shrink:0;}
.toggle.on{background:#3b82f6;}
.toggle::after{content:'';position:absolute;left:2px;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.1);}
.toggle.on::after{transform:translateX(16px);}

/* ── Mobile Menu Toggle ── */
.menu-toggle{display:none;border:none;background:none;padding:4px;color:#475569;cursor:pointer;}
.menu-toggle svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:9;}

/* ── Responsive: Tablet (≤1024px) ── */
@media(max-width:1024px){
  .stats-grid{grid-template-columns:repeat(3,1fr);}
  .two-col{grid-template-columns:1fr;}
  .detail-panel{width:100%;max-width:100%;}
  .modal{width:95vw;}
  .doc-table th:nth-child(4),.doc-table td:nth-child(4),
  .doc-table th:nth-child(5),.doc-table td:nth-child(5),
  .doc-table th:nth-child(11),.doc-table td:nth-child(11){display:none;}
  .form-grid-2{grid-template-columns:1fr;}
  .form-grid-3{grid-template-columns:1fr 1fr;}
  .step-grid{grid-template-columns:1fr;}
}

/* ── Responsive: Mobile (≤768px) ── */
@media(max-width:768px){
  .menu-toggle{display:flex;}
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay.open{display:block;}
  .main{margin-left:0;}
  .header{padding:0 12px;gap:8px;}
  .content{padding:12px;}
  .search-box input{width:160px;font-size:11px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px;}
  .stat-card .value{font-size:20px;}
  .breadcrumb{display:none;}
  .doc-table{font-size:11px;}
  .doc-table th:nth-child(1),.doc-table td:nth-child(1),
  .doc-table th:nth-child(3),.doc-table td:nth-child(3),

  .doc-table th:nth-child(11),.doc-table td:nth-child(11){display:none;}
  .filter-bar{gap:4px;}
  .filter-bar select{font-size:10px;padding:4px 6px;}
  .tag-btn{font-size:9px;padding:2px 6px;}
  .case-header h2{font-size:14px;}
  .case-meta{gap:8px;}
  .info-grid{grid-template-columns:1fr;}
  #toast-container{left:12px;right:12px;bottom:12px;}
  .toast{min-width:auto;}
}

/* ── Responsive: Small Mobile (≤480px) ── */
@media(max-width:480px){
  .search-box input{width:120px;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .header-right .btn-primary,.header-right .btn-secondary{display:none;}
  .user-avatar{width:28px;height:28px;font-size:10px;}
  .detail-panel{width:100vw;}
}

function lsGet(key, fallback) { try { const v=localStorage.getItem(key); return v?JSON.parse(v):fallback; } catch{ return fallback; } }
function lsSet(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function uid() { return 'id-'+Date.now()+'-'+Math.random().toString(36).substr(2,6); }

// ────────────────────────────────────────────────────────────
// DataAdapter — Phase 1: localStorage / Phase 2: SP REST API
//
// SP 전환 시 각 메서드의 localStorage 호출을
// 아래 주석의 SP REST API 호출로 교체합니다.
// API Base: /_api/web/lists/getbytitle('{ListName}')
//
// Documents  → SP 문서 라이브러리 메타 + LKA_DocMeta 리스트
// Categories → LKA_Categories 리스트
// Tags       → LKA_Tags 리스트
// DocMemos   → LKA_DocMemos 리스트
// CaseNotes  → LKA_CaseNotes 리스트
// Owner      → SP Person 필드 (Azure AD UserId)
// ────────────────────────────────────────────────────────────
const DA = {
  // ── Documents ──
  // SP: GET  .../LKA_DocMeta/items  (+ JOIN 문서 라이브러리 메타)
  // SP: POST .../LKA_DocMeta/items  (신규 문서 메타 등록)
  // SP: MERGE .../LKA_DocMeta/items({id})  (수정)
  // SP: DELETE .../LKA_DocMeta/items({id})  (삭제 → CASCADE memo/notes)
  // source 필드: 'local'(여기서 등록) vs 'sp'(SharePoint 동기화)
  // source 없는 기존 데이터(시드 포함) → 'sp'로 처리 (보수적 기본값)
  getDocs() {
    const docs = lsGet(LS.DOCS, []);
    return docs.map(d => d.source ? d : {...d, source:'sp'});
  },
  getDoc(id) { return this.getDocs().find(d=>d.id===id)||null; },
  addDoc(doc) { const docs=lsGet(LS.DOCS,[]); const nd={...doc, id:uid(), source:'local', created:new Date().toISOString()}; docs.push(nd); lsSet(LS.DOCS,docs); return nd; },
  updateDoc(id, fields) { const docs=this.getDocs(); const i=docs.findIndex(d=>d.id===id); if(i<0)return null; Object.assign(docs[i],fields,{updated:new Date().toISOString()}); lsSet(LS.DOCS,docs); return docs[i]; },
  deleteDoc(id) { let docs=this.getDocs(); docs=docs.filter(d=>d.id!==id); lsSet(LS.DOCS,docs); const memos=lsGet(LS.MEMOS,{}); delete memos[id]; lsSet(LS.MEMOS,memos); return true; },

  // ── Categories ──
  // SP: GET  .../LKA_Categories/items?$orderby=Name
  // SP: POST .../LKA_Categories/items  { Name, ParentId, SPFolderPath }
  // SP: DELETE .../LKA_Categories/items({id})
  getCats() { return lsGet(LS.CATS, []); },
  addCat(cat) { const cats=this.getCats(); const nc={...cat,id:uid()}; cats.push(nc); lsSet(LS.CATS,cats); return nc; },
  updateCat(id,fields) { const cats=this.getCats(); const c=cats.find(c=>c.id===id); if(c)Object.assign(c,fields); lsSet(LS.CATS,cats); return c; },
  deleteCat(id) { let cats=this.getCats(); cats=cats.filter(c=>c.id!==id&&c.parentId!==id); lsSet(LS.CATS,cats); return true; },
  getCatCount(catId) { return this.getDocs().filter(d=>d.catId===catId).length; },

  // ── Tags ──
  // SP: GET  .../LKA_Tags/items
  // SP: POST .../LKA_Tags/items  { TagName, TagColor }
  // SP: DELETE .../LKA_Tags/items({id})
  getTags() { return lsGet(LS.TAGS, []); },
  addTag(tag) { const tags=this.getTags(); const nt={...tag,id:uid()}; tags.push(nt); lsSet(LS.TAGS,tags); return nt; },
  deleteTag(id) { let tags=this.getTags(); tags=tags.filter(t=>t.id!==id); lsSet(LS.TAGS,tags);
    const docs=this.getDocs(); docs.forEach(d=>{ d.tagIds=d.tagIds.filter(t=>t!==id); }); lsSet(LS.DOCS,docs); return true; },

  // ── Users ──
  // SP: GET  .../LKA_Users/items  또는 Azure AD Graph API /users
  // SP: MERGE .../LKA_Users/items({id}) { Role }
  // 실제 운영 시: Azure AD 그룹 기반으로 역할 자동 매핑 가능
  getUsers() { return lsGet(LS.USERS, []); },
  updateUserRole(id,role) { const users=this.getUsers(); const u=users.find(u=>u.id===id); if(u)u.role=role; lsSet(LS.USERS,users); return u; },
  addUser(user) { const users=this.getUsers(); const nu={...user,id:uid()}; users.push(nu); lsSet(LS.USERS,users); return nu; },
  removeUser(id) { let users=this.getUsers(); users=users.filter(u=>u.id!==id); lsSet(LS.USERS,users); return true; },

  // ── Document Memos (4 sections) ──
  // SP: GET  .../LKA_DocMemos/items?$filter=DocId eq '{docId}'
  // SP: POST or MERGE .../LKA_DocMemos/items  { DocId, MemoIssue, MemoJudgment, MemoRisk, MemoFuture }
  // SP: ModifiedBy → Person 필드 (현재 로그인 사용자 자동 기록)
  getDocMemo(docId) { const all=lsGet(LS.MEMOS,{}); return all[docId]||{issue:'',judgment:'',risk:'',future:'',modified:'',modifiedBy:''}; },
  setDocMemo(docId,fields) { const all=lsGet(LS.MEMOS,{}); all[docId]={...fields,modified:new Date().toISOString(),modifiedBy:CURRENT_USER_ID}; lsSet(LS.MEMOS,all); return all[docId]; },
  hasMemo(docId) { const m=this.getDocMemo(docId); return !!(m.issue||m.judgment||m.risk||m.future); },

  // ── Case Notes ──
  // SP: GET  .../LKA_CaseNotes/items?$filter=CatId eq '{catId}'&$orderby=Created desc
  // SP: POST .../LKA_CaseNotes/items  { CatId, DocId, Title, Content, IsPinned }
  // SP: MERGE .../LKA_CaseNotes/items({id})
  // SP: DELETE .../LKA_CaseNotes/items({id})
  // SP: Author → Person 필드 (자동)
  getCaseNotes(catId) { const all=lsGet(LS.CASE_NOTES,[]); return catId?all.filter(n=>n.catId===catId):all; },
  addCaseNote(note) { const all=lsGet(LS.CASE_NOTES,[]); const nn={...note,id:uid(),author:CURRENT_USER_ID,date:new Date().toISOString()}; all.unshift(nn); lsSet(LS.CASE_NOTES,all); return nn; },
  updateCaseNote(id,fields) { const all=lsGet(LS.CASE_NOTES,[]); const n=all.find(n=>n.id===id); if(n)Object.assign(n,fields); lsSet(LS.CASE_NOTES,all); return n; },
  deleteCaseNote(id) { let all=lsGet(LS.CASE_NOTES,[]); all=all.filter(n=>n.id!==id); lsSet(LS.CASE_NOTES,all); return true; },

  // ── AI Cache ──
  getAISummary(catId) { return lsGet(LS.AI_SUMMARIES,{})[catId]||null; },
  setAISummary(catId,data) { const all=lsGet(LS.AI_SUMMARIES,{}); all[catId]=data; lsSet(LS.AI_SUMMARIES,all); },
  getChatHistory(catId) { return lsGet(LS.CHAT_HIST,{})[catId]||[]; },
  addChatMsg(catId,msg) { const all=lsGet(LS.CHAT_HIST,{}); if(!all[catId])all[catId]=[]; all[catId].push(msg); lsSet(LS.CHAT_HIST,all); },
  clearChat(catId) { const all=lsGet(LS.CHAT_HIST,{}); delete all[catId]; lsSet(LS.CHAT_HIST,all); },

  // ── Azure Config ──
  getAzConfig() { return lsGet(LS.AZ_CONFIG,{}); },
  setAzConfig(cfg) { lsSet(LS.AZ_CONFIG,cfg); },
  clearAzConfig() { localStorage.removeItem(LS.AZ_CONFIG); },

  // ── Seed ──
  seedIfEmpty() {
    if(localStorage.getItem(LS.SEEDED)) return;
    lsSet(LS.DOCS, SEED_DOCUMENTS);
    lsSet(LS.CATS, SEED_CATEGORIES);
    lsSet(LS.TAGS, SEED_TAGS);
    lsSet(LS.USERS, SEED_USERS);
    lsSet(LS.CASE_NOTES, SEED_CASE_NOTES);
    const memos={};
    SEED_DOCUMENTS.forEach(d=>{ if(d.memos&&Object.values(d.memos).some(v=>v)) memos[d.id]={...d.memos,modified:d.created,modifiedBy:'시스템'}; });
    lsSet(LS.MEMOS, memos);
    localStorage.setItem(LS.SEEDED,'1');
  }
};

async function callAzureAI(prompt, maxTokens=800) {
  const cfg=DA.getAzConfig();
  if(!cfg.endpoint||!cfg.deploymentName||!cfg.apiKey) throw new Error('Azure OpenAI 설정이 필요합니다.');
  const url=`${cfg.endpoint.replace(/\/$/,'')}/openai/deployments/${cfg.deploymentName}/chat/completions?api-version=2024-02-01`;
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','api-key':cfg.apiKey},
    body:JSON.stringify({messages:[{role:'system',content:'당신은 기업 법무팀 AI 어시스턴트입니다. 한국어로 간결하게 답변하세요.'},{role:'user',content:prompt}],max_tokens:maxTokens,temperature:0.3})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||'API 오류 '+res.status);}
  return(await res.json()).choices[0].message.content;
}

async function generateAISummary(catId) {
  const cat=DA.getCats().find(c=>c.id===catId);
  const docs=DA.getDocs().filter(d=>d.catId===catId).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const caseNotes=DA.getCaseNotes(catId);
  const docCtx=docs.map(d=>{const m=DA.getDocMemo(d.id);const p=[m.issue&&`쟁점:${m.issue}`,m.judgment&&`판단:${m.judgment}`,m.risk&&`리스크:${m.risk}`].filter(Boolean);return`- [${d.date}] ${d.title}${p.length?'\n  '+p.join(' / '):''}`;}).join('\n');
  const prompt=`사건명: ${cat.name}\n문서 목록:\n${docCtx}\n사건 메모:\n${caseNotes.length>0?caseNotes.map(n=>`- [${n.pinned?'고정':'일반'}] ${n.title}: ${n.content}`).join('\n'):'없음'}\n\nJSON만 출력:\n{"summary":"3~5문장 요약","status":"진행중/완료/검토중","keyIssues":["이슈1","이슈2"],"nextActions":["조치1","조치2"],"riskLevel":"높음/중간/낮음"}`;
  state.aiLoading=true;render();
  try{const text=await callAzureAI(prompt,1000);const json=JSON.parse(text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim());DA.setAISummary(catId,json);state.aiLoading=false;render();toast('AI 요약이 생성되었습니다.');}
  catch(e){state.aiLoading=false;render();toast('AI 요약 실패: '+e.message,'error');}
}

// ── AI 문서 메모 자동 작성 ──
// SP 연동 시: Graph API로 파일 내용을 추출 (PDF→텍스트, DOCX→텍스트)
//   GET /drives/{driveId}/items/{itemId}/content → 파일 다운로드
//   또는 GET /drives/{driveId}/items/{itemId}/preview → 미리보기 URL
//   PDF/DOCX 텍스트 추출은 Azure AI Document Intelligence 활용 가능
// 데모 모드: body 필드(검색용 본문) + 기존 메모를 컨텍스트로 사용
async function generateDocMemo(docId) {
  const doc=DA.getDoc(docId);if(!doc)return;
  const existingMemo=DA.getDocMemo(docId);
  const relatedDocs=doc.matterName?DA.getDocs().filter(d=>d.id!==docId&&d.matterName===doc.matterName):[];

  // 실제 SP 연동 시 여기서 파일 내용을 가져옴
  // const fileContent = await fetchFileContent(doc.sharepoint_item_id);
  const fileContent=doc.body||'(파일 본문 없음)';

  const relCtx=relatedDocs.length>0?`\n\n관련 문서:\n${relatedDocs.map(d=>{const m=DA.getDocMemo(d.id);return`- ${d.title} (${d.date}): ${[m.issue,m.judgment].filter(Boolean).join(' / ')||'메모없음'}`;}).join('\n')}`:'';

  const prompt=`당신은 기업 법무팀의 법률 문서 분석 전문가입니다.
아래 문서를 분석하여 법무팀 실무 관점에서 4가지 섹션의 메모를 작성해주세요.

## 문서 정보
- 제목: ${doc.title}
- 유형: ${doc.docType} / 분류: ${doc.workCat}
- 일자: ${doc.date}
- 당사자: ${(doc.parties||[]).join(', ')||'없음'}
- 관련 사건: ${doc.matterName||'없음'}
- 상태: ${doc.status}

## 문서 내용
${fileContent}
${relCtx}

## 출력 형식 (JSON만, 코드블록 없이)
{"issue":"핵심 법적 쟁점을 간결하게 정리 (줄바꿈으로 구분)","judgment":"법무팀 관점의 실무적 판단과 대응 방향","risk":"잠재적 법적 리스크와 유의사항","future":"향후 유사 건 처리 시 참고할 사항, 일정, 기한 등"}

각 섹션은 2~4줄로 핵심만 작성하세요.`;

  state.aiMemoLoading=docId;render();
  try {
    const text=await callAzureAI(prompt,1200);
    const json=JSON.parse(text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim());
    // 기존 메모가 있으면 병합 여부 확인 없이 덮어쓰기 (비어있는 섹션만 채우기)
    const merged={
      issue:existingMemo.issue||json.issue||'',
      judgment:existingMemo.judgment||json.judgment||'',
      risk:existingMemo.risk||json.risk||'',
      future:existingMemo.future||json.future||''
    };
    DA.setDocMemo(docId,merged);
    state.aiMemoLoading=null;
    // 상세 패널이 열려있으면 갱신
    if(state.selDoc&&state.selDoc.id===docId) state.selDoc=DA.getDoc(docId);
    render();
    toast('AI가 메모를 작성했습니다.');
  } catch(e) {
    state.aiMemoLoading=null;render();
    toast('AI 메모 작성 실패: '+e.message,'error');
  }
}

async function sendChatMessage(catId, userMessage) {
  DA.addChatMsg(catId,{role:'user',content:userMessage});
  state.chatLoading=true;render();
  setTimeout(()=>{const el=document.getElementById('chatMessages');if(el)el.scrollTop=el.scrollHeight;},50);
  const cat=DA.getCats().find(c=>c.id===catId);
  const docs=DA.getDocs().filter(d=>d.catId===catId);
  const ctx=docs.map(d=>{const m=DA.getDocMemo(d.id);return`- [${d.date}] ${d.title}: ${[m.issue,m.judgment,m.risk,m.future].filter(Boolean).join(' | ')||'메모없음'}`;}).join('\n');
  const history=DA.getChatHistory(catId);
  const messages=[{role:'system',content:`법무팀 AI 어시스턴트. 사건: ${cat.name}\n문서:\n${ctx}`},...history.map(m=>({role:m.role,content:m.content}))];
  const cfg=DA.getAzConfig();
  if(!cfg.endpoint||!cfg.apiKey){DA.getChatHistory(catId).pop();state.chatLoading=false;render();toast('Azure OpenAI 설정이 필요합니다.','error');return;}
  const url=`${cfg.endpoint.replace(/\/$/,'')}/openai/deployments/${cfg.deploymentName}/chat/completions?api-version=2024-02-01`;
  try{const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','api-key':cfg.apiKey},body:JSON.stringify({messages,max_tokens:1500,temperature:0.4})});
    if(!res.ok)throw new Error('API 오류');const data=await res.json();DA.addChatMsg(catId,{role:'assistant',content:data.choices[0].message.content});state.chatLoading=false;render();
    setTimeout(()=>{const el=document.getElementById('chatMessages');if(el)el.scrollTop=el.scrollHeight;},50);
  }catch(e){state.chatLoading=false;render();toast('AI 응답 실패: '+e.message,'error');}
}

function render() {
  const app=document.getElementById('app');
  app.innerHTML=renderSidebar()+`<div class="sidebar-overlay${state.sidebarOpen?' open':''}" id="sidebarOverlay"></div>`+`<div class="main">${renderHeader()}<div class="content">${renderContent()}</div></div>`+(state.selDoc?renderDetail():'')+(state.showDocModal?renderDocModal():'')+(state.showCaseInfoEdit?renderCaseInfoModal():'')+(state.showBulkOwner?renderBulkOwnerModal():'')+(state.showBulkTag?renderBulkTagModal():'')+(state.showConfirm?renderConfirm():'');
  bindEvents();
}

function renderSidebar() {
  const cats=DA.getCats();
  const roots=cats.filter(c=>!c.parentId);
  const isAct=p=>state.page===p&&!state.caseSummary&&!state.selCat;

  let caseHtml='';
  roots.forEach(r=>{
    const isExp=state.expandedCats[r.id];
    const allChildren=cats.filter(c=>c.parentId===r.id);
    const children=state.hideCompleted?allChildren.filter(c=>c.caseStatus!=='완료'):allChildren;
    const hiddenCount=allChildren.length-children.length;
    const cnt=DA.getDocs().filter(d=>{const cc=cats.find(c=>c.id===d.catId);return(d.catId===r.id||(cc&&cc.parentId===r.id))&&(!state.hideCompleted||!cc||cc.caseStatus!=='완료');}).length;
    if(cnt===0&&state.hideCompleted&&children.length===0) return;
    caseHtml+=`<button class="cat-item${state.selCat===r.id?' active':''}" data-cat="${r.id}" ${allChildren.length?`data-toggle="${r.id}"`:''}><span style="display:flex;align-items:center;gap:4px">${allChildren.length?`<span style="color:#94a3b8;display:flex">${isExp?IC.chevDown:IC.chevRight}</span>`:'<span style="width:10px"></span>'}${esc(r.name)}</span><span class="count">${cnt}</span></button>`;
    if(isExp&&children.length) children.forEach(k=>{
      const kc=DA.getCatCount(k.id);
      const closed=k.caseStatus==='완료';
      caseHtml+=`<div class="cat-child"><button class="cat-item${state.selCat===k.id?' active':''}${closed?' closed':''}" data-cat="${k.id}"><span style="display:flex;align-items:center;gap:4px;${closed?'opacity:.6':''}">${esc(k.name)}${closed?'<span style="font-size:8px;color:#94a3b8;font-weight:400">완료</span>':''}</span><span class="count">${kc}</span></button></div>`;
    });
    if(isExp&&hiddenCount>0) caseHtml+=`<div class="cat-child"><span style="font-size:10px;color:#cbd5e1;padding:2px 10px">+ 종료 ${hiddenCount}건 숨김</span></div>`;
  });

  const importantCount=DA.getDocs().filter(d=>d.importance==='High').length;
  const myCases=cats.filter(c=>c.caseManager===CURRENT_USER_ID);
  const closedCatIds=state.hideCompleted?cats.filter(c=>c.caseStatus==='완료').map(c=>c.id):[];
  const myCount=DA.getDocs().filter(d=>(d.owner===CURRENT_USER_ID||myCases.some(c=>c.id===d.catId))&&!closedCatIds.includes(d.catId)).length;

  return `<aside class="sidebar${state.sidebarOpen?' open':''}">
    <div class="logo" id="logoHome" style="cursor:pointer"><div class="logo-icon">${IC.scale}</div><div><div class="logo-text">법무 지식 아카이브</div><div class="logo-sub">Legal Knowledge Archive</div></div></div>
    <div class="sidebar-scroll">
      <div class="nav">
        <button class="nav-item${isAct('dashboard')?' active':''}" data-page="dashboard"><span class="nav-icon">${IC.dashboard}</span>대시보드</button>
        <button class="nav-item${state.page==='important'?' active':''}" data-page="important"><span class="nav-icon">${IC.star}</span>중요 문서 ${importantCount?`<span style="font-size:10px;color:#f59e0b;margin-left:auto">${importantCount}</span>`:''}</button>
        <button class="nav-item${state.page==='mine'?' active':''}" data-page="mine"><span class="nav-icon">${IC.user}</span>내 담당 ${myCount?`<span style="font-size:10px;color:#3b82f6;margin-left:auto">${myCount}</span>`:''}</button>
      </div>
      <div class="cat-label">사건/사무 분류</div><div class="cat-section">${caseHtml}</div>
    </div>
    ${isAdmin()?`<div style="padding:4px 10px 6px;border-top:1px solid #e2e8f0"><button class="nav-item${isAct('settings')?' active':''}" data-page="settings"><span class="nav-icon">${IC.settings}</span>설정</button></div>`:''}
    <div class="sync-status"><div><span class="sync-dot"></span>동기화 상태: 정상</div><div style="margin-top:2px">마지막 동기화: ${fdatetime(new Date().toISOString())}</div></div>
  </aside>`;
}

function renderBreadcrumb() {
  const parts=[];
  const titles={dashboard:'대시보드',documents:'문서 목록',important:'중요 문서',mine:'내 담당',settings:'설정'};
  if(state.caseSummary){
    const cat=DA.getCats().find(c=>c.id===state.caseSummary);
    const parent=cat?DA.getCats().find(c=>c.id===cat.parentId):null;
    parts.push({label:parent?parent.name:'문서',action:true});
    parts.push({label:cat?cat.name:'사건 요약',current:true});
  } else if(state.selCat){
    parts.push({label:'문서 목록',action:true});
    const cat=DA.getCats().find(c=>c.id===state.selCat);
    const parent=cat?DA.getCats().find(c=>c.id===cat.parentId):null;
    if(parent) parts.push({label:parent.name});
    parts.push({label:cat?cat.name:'',current:true});
  } else {
    parts.push({label:titles[state.page]||'문서',current:true});
  }
  return `<div class="breadcrumb">${parts.map((p,i)=>{
    const sep=i>0?'<span class="bc-sep">/</span>':'';
    return sep+(p.current?`<span class="bc-current">${esc(p.label)}</span>`:`<span>${esc(p.label)}</span>`);
  }).join('')}</div>`;
}

// ── Filter & Sort ──
function getFilteredDocs() {
  let docs=DA.getDocs();
  // 유효건만 토글 (전역)
  if(state.hideCompleted){
    const closedIds=DA.getCats().filter(c=>c.caseStatus==='완료').map(c=>c.id);
    docs=docs.filter(d=>!closedIds.includes(d.catId));
  }
  // 페이지별 필터
  if(state.page==='important') docs=docs.filter(d=>d.importance==='High');
  else if(state.page==='mine'){
    const myCaseIds=DA.getCats().filter(c=>c.caseManager===CURRENT_USER_ID).map(c=>c.id);
    docs=docs.filter(d=>d.owner===CURRENT_USER_ID||myCaseIds.includes(d.catId));
  }
  if(state.selCat) docs=docs.filter(d=>d.catId===state.selCat);
  if(state.selTag) docs=docs.filter(d=>(d.tagIds||[]).includes(state.selTag));
  if(state.filterDocType!=='전체') docs=docs.filter(d=>d.docType===state.filterDocType);
  if(state.filterWorkCat!=='전체') docs=docs.filter(d=>d.workCat===state.filterWorkCat);
  if(state.filterStatus!=='전체') docs=docs.filter(d=>d.status===state.filterStatus);
  if(state.filterImportance!=='전체') docs=docs.filter(d=>d.importance===state.filterImportance);
  if(state.filterOwner!=='전체') docs=docs.filter(d=>d.owner===state.filterOwner);
  if(state.search){const q=state.search.toLowerCase();docs=docs.filter(d=>{
    if(d.title.toLowerCase().includes(q))return true;if(d.fileName.toLowerCase().includes(q))return true;
    if((d.parties||[]).some(p=>p.toLowerCase().includes(q)))return true;
    if(getTagObjs(d.tagIds).some(t=>t.name.toLowerCase().includes(q)))return true;
    if(d.body&&d.body.toLowerCase().includes(q))return true;
    if(d.matterName&&d.matterName.toLowerCase().includes(q))return true;
    const m=DA.getDocMemo(d.id);if(m&&Object.values(m).some(v=>typeof v==='string'&&v.toLowerCase().includes(q)))return true;
    return false;
  });}
  // Sort
  if(state.sortCol){
    const dir=state.sortDir==='asc'?1:-1;
    docs.sort((a,b)=>{let va=a[state.sortCol]||'',vb=b[state.sortCol]||'';
      if(state.sortCol==='date'||state.sortCol==='created')return dir*(new Date(va)-new Date(vb));
      if(typeof va==='string')return dir*va.localeCompare(vb);return 0;});
  }
  return docs;
}

function highlightText(text,q){if(!q)return esc(text);const e=esc(text);const r=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return e.replace(r,'<span class="search-highlight">$1</span>');}

function renderContent(){
  if(state.page==='dashboard')return renderDashboard();
  if(state.page==='settings')return renderSettings();
  if(state.caseSummary)return renderCaseSummary();
  return renderDocList();
}

function renderDashboard(){
  const docs=DA.getDocs();
  const cats=DA.getCats();
  const activeCases=cats.filter(c=>c.parentId&&(c.caseStatus==='진행중'||c.caseStatus==='검토중'));
  const highImp=docs.filter(d=>d.importance==='High').length;
  const totalMemos=docs.filter(d=>DA.hasMemo(d.id)).length;
  const myCases=cats.filter(c=>c.parentId&&c.caseManager===CURRENT_USER_ID&&c.caseStatus==='진행중');
  const recent=[...docs].sort((a,b)=>new Date(b.created)-new Date(a.created)).slice(0,5);
  const typeMap={};docs.forEach(d=>{typeMap[d.docType]=(typeMap[d.docType]||0)+1;});
  const typeSorted=Object.entries(typeMap).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // 최근 팀 활동: 메모 수정 + 사건 메모 추가
  const activities=[];
  docs.forEach(d=>{const m=DA.getDocMemo(d.id);if(m.modified)activities.push({type:'memo',docTitle:d.title,docId:d.id,who:m.modifiedBy,date:m.modified});});
  DA.getCaseNotes().forEach(n=>{const cat=cats.find(c=>c.id===n.catId);activities.push({type:'note',catName:cat?cat.name:'',noteTitle:n.title,catId:n.catId,who:n.author,date:n.date});});
  activities.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const recentActivities=activities.slice(0,8);

  return `<div class="stats-grid">
    <div class="stat-card"><div class="label">전체 문서</div><div class="value" style="color:#3b82f6">${docs.length}</div></div>
    <div class="stat-card"><div class="label">진행 중 사건</div><div class="value" style="color:#d97706">${activeCases.length}</div></div>
    <div class="stat-card"><div class="label">중요 문서</div><div class="value" style="color:#dc2626">${highImp}</div></div>
    <div class="stat-card"><div class="label">내 담당 사건</div><div class="value" style="color:#3b82f6">${myCases.length}</div></div>
    <div class="stat-card"><div class="label">메모 작성</div><div class="value" style="color:#8b5cf6">${totalMemos}</div></div>
  </div>
  <div class="two-col">
    <div class="card"><h3>최근 팀 활동</h3>
      ${recentActivities.length>0?recentActivities.map(a=>{
        if(a.type==='memo') return`<div class="recent-item" data-doc="${a.docId}"><div style="display:flex;align-items:center;gap:8px">
          <div style="min-width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#1e40af,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:600">${esc(userName(a.who).charAt(0)||'?')}</div>
          <div><div style="font-size:11px"><strong>${esc(userName(a.who))}</strong> 메모 수정</div><div style="font-size:10px;color:#64748b">${esc(a.docTitle)}</div></div>
        </div><span class="date">${fdate(a.date)}</span></div>`;
        return`<div class="recent-item" data-case-cat="${a.catId}"><div style="display:flex;align-items:center;gap:8px">
          <div style="min-width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:600">${esc(userName(a.who).charAt(0)||'?')}</div>
          <div><div style="font-size:11px"><strong>${esc(userName(a.who))}</strong> 사건 메모 추가</div><div style="font-size:10px;color:#64748b">${esc(a.catName)} — ${esc(a.noteTitle)}</div></div>
        </div><span class="date">${fdate(a.date)}</span></div>`;
      }).join(''):`<div style="padding:16px;text-align:center;color:#94a3b8;font-size:12px">아직 활동이 없습니다.</div>`}
    </div>
    <div class="card"><h3>문서유형 분포</h3>${typeSorted.map(([t,c])=>`<div class="bar-row"><div class="bar-label"><span style="color:#475569">${esc(t)}</span><span>${c}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(c/docs.length)*100}%"></div></div></div>`).join('')}</div>
  </div>
  <div class="card"><h3>최근 등록 문서</h3>
    ${recent.map(d=>`<div class="recent-item" data-doc="${d.id}"><div style="display:flex;align-items:center;gap:8px">
      <div class="file-icon" style="min-width:28px;height:28px;background:${fcolor(d.ext)}15;color:${fcolor(d.ext)};font-size:8px">${ficon(d.ext)}</div>
      <div><div class="title">${esc(d.title)}</div><div style="display:flex;gap:3px;margin-top:1px">${docTypeBadge(d.docType)} ${impBadge(d.importance)}</div></div>
    </div><span class="date">${fdatetime(d.created)}</span></div>`).join('')}
  </div>`;
}

function renderDocRow(d) {
  const tags=getTagObjs(d.tagIds);const c=fcolor(d.ext);
  const titleHtml=state.search?highlightText(d.title,state.search):esc(d.title);
  const checked=state.selectedDocs.has(d.id);
  return`<tr data-doc="${d.id}">
    <td style="width:30px" onclick="event.stopPropagation()"><input type="checkbox" class="table-checkbox" data-check="${d.id}" ${checked?'checked':''}></td>
    <td style="min-width:180px"><div class="doc-title-cell"><div class="file-icon" style="background:${c}15;color:${c}">${ficon(d.ext)}</div><div><div class="doc-title">${titleHtml}</div><div class="doc-tags">${tags.map(t=>`<span class="tag" style="background:${t.color}18;color:${t.color}">${esc(t.name)}</span>`).join('')}</div></div></div></td>
    <td>${docTypeBadge(d.docType)}</td>
    <td>${workCatBadge(d.workCat)}</td>
    <td><span class="matter-cell" title="${esc(d.matterName||'')}">${d.matterName?esc(d.matterName):'-'}</span></td>
    <td style="font-size:11px;color:#475569">${esc(userName(d.owner))}</td>
    <td style="font-size:11px;color:#64748b">${fdate(d.date)}</td>
    <td>${statusBadge(d.status)}</td>
    <td onclick="event.stopPropagation()">${canEdit()?`<button class="star-btn${d.importance==='High'?' starred':''}" data-star="${d.id}" title="중요 문서 표시">${d.importance==='High'?'★':'☆'}</button>`:`<span style="color:${d.importance==='High'?'#f59e0b':'#e2e8f0'}">${d.importance==='High'?'★':'☆'}</span>`}</td>
    <td>${DA.hasMemo(d.id)?'<span class="note-indicator">M</span>':'<span style="color:#e2e8f0">-</span>'}</td>
    <td><button class="sp-link-btn" onclick="event.stopPropagation()" title="SharePoint에서 열기">${IC.link} 열기</button></td>
  </tr>`;
}

function renderDocList(){
  const allDocs=getFilteredDocs();
  const hasFilter=state.filterDocType!=='전체'||state.filterWorkCat!=='전체'||state.filterStatus!=='전체'||state.filterImportance!=='전체'||state.filterOwner!=='전체'||state.selTag;
  const mkSel=(id,opts,val,label)=>`<select id="${id}" title="${label}"><option value="전체">${label}: 전체</option>${opts.filter(o=>o!=='전체').map(o=>`<option${val===o?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
  const sortArrow=(col)=>{if(state.sortCol!==col)return'<span class="sort-arrow">↕</span>';return`<span class="sort-arrow ${state.sortDir}">${state.sortDir==='asc'?'↑':'↓'}</span>`;};
  const selCount=state.selectedDocs.size;

  // 폴더별 그룹핑 (특정 카테고리 선택 시 또는 검색/정렬 시에는 평면 리스트)
  const useGrouping=!state.selCat&&!state.search&&!state.sortCol;
  let rows='';

  if(useGrouping){
    const cats=DA.getCats();
    const roots=cats.filter(c=>!c.parentId);
    roots.forEach(root=>{
      const children=cats.filter(c=>c.parentId===root.id);
      const rootDocs=allDocs.filter(d=>d.catId===root.id);
      const childDocs=children.map(ch=>({cat:ch,docs:allDocs.filter(d=>d.catId===ch.id)}));
      const totalInRoot=rootDocs.length+childDocs.reduce((s,g)=>s+g.docs.length,0);
      if(totalInRoot===0)return;
      const rootExp=state.expandedCats[root.id]!==false;
      rows+=`<tr class="group-parent" data-toggle-group="${root.id}"><td colspan="11"><div class="gp-name"><span style="color:#94a3b8;display:flex">${rootExp?IC.chevDown:IC.chevRight}</span>${IC.folder} ${esc(root.name)} <span class="gh-count">${totalInRoot}건</span></div></td></tr>`;
      if(rootExp){
        if(children.length>0){
          childDocs.forEach(g=>{
            if(g.docs.length===0)return;
            const childExp=state.expandedCats[g.cat.id]!==false;
            rows+=`<tr class="group-header" data-toggle-group="${g.cat.id}"><td colspan="11"><div class="gh-name" style="padding-left:16px"><span style="color:#94a3b8;display:flex">${childExp?IC.chevDown:IC.chevRight}</span>${esc(g.cat.name)} ${g.cat.caseStatus?statusBadge(g.cat.caseStatus):''} <span class="gh-count">${g.docs.length}건${g.cat.caseManager?' · '+esc(userName(g.cat.caseManager)):''}</span></div></td></tr>`;
            if(childExp) rows+=g.docs.map(d=>renderDocRow(d)).join('');
          });
        }
        if(rootDocs.length>0) rows+=rootDocs.map(d=>renderDocRow(d)).join('');
      }
    });
    // 미분류 문서
    const uncat=allDocs.filter(d=>!cats.some(c=>c.id===d.catId));
    if(uncat.length>0){
      rows+=`<tr class="group-parent"><td colspan="11"><div class="gp-name">${IC.folder} 미분류 <span class="gh-count">${uncat.length}건</span></div></td></tr>`;
      rows+=uncat.map(d=>renderDocRow(d)).join('');
    }
  } else {
    // 평면 리스트 (카테고리 선택, 검색, 정렬 시)
    const totalPages=Math.max(1,Math.ceil(allDocs.length/state.pageSize));
    if(state.currentPage>totalPages) state.currentPage=totalPages;
    const start=(state.currentPage-1)*state.pageSize;
    const docs=allDocs.slice(start,start+state.pageSize);
    rows=docs.map(d=>renderDocRow(d)).join('');
  }

  let paginationHtml='';
  if(!useGrouping&&allDocs.length>state.pageSize){
    const totalPages=Math.ceil(allDocs.length/state.pageSize);
    const pages=[];for(let i=1;i<=totalPages;i++)pages.push(i);
    paginationHtml=`<div class="pagination">
      <button ${state.currentPage<=1?'disabled':''} data-ppage="${state.currentPage-1}">이전</button>
      ${pages.map(p=>`<button class="${p===state.currentPage?'active':''}" data-ppage="${p}">${p}</button>`).join('')}
      <button ${state.currentPage>=totalPages?'disabled':''} data-ppage="${state.currentPage+1}">다음</button>
    </div>`;
  }

  const localSelected = [...state.selectedDocs].filter(id=>{ const d=DA.getDoc(id); return d&&d.source==='local'; }).length;
  return `${selCount>0?`<div class="bulk-bar">
    <span style="font-weight:600">${selCount}건 선택</span>
    <div style="width:1px;height:16px;background:#bfdbfe;margin:0 2px"></div>
    ${canEdit()?`<button class="btn-secondary" id="bulkOwnerBtn" style="padding:3px 10px;font-size:11px">👤 담당자 변경</button>
    <button class="btn-secondary" id="bulkTagBtn" style="padding:3px 10px;font-size:11px">🏷 태그 추가</button>`:``}
    <button class="btn-secondary" id="bulkExportBtn" style="padding:3px 10px;font-size:11px">📥 CSV 내보내기</button>
    ${canEdit()&&localSelected>0?`<button class="btn-secondary" id="bulkDeleteBtn" style="padding:3px 10px;font-size:11px;color:#dc2626;border-color:#fecaca">🗑 삭제 (${localSelected}건)</button>`:``}
    <button class="btn-secondary" id="bulkClear" style="padding:3px 10px;font-size:11px">✕ 선택 해제</button>
  </div>`:''}
  <div class="filter-bar">
    ${mkSel('fDocType',DOC_TYPES,state.filterDocType,'문서유형')}
    ${mkSel('fWorkCat',WORK_CATS,state.filterWorkCat,'업무분류')}
    <select id="fOwner" title="담당자"><option value="전체">담당자: 전체</option>${getOwnerUsers().map(u=>`<option value="${u.id}"${state.filterOwner===u.id?' selected':''}>${esc(u.name)}</option>`).join('')}</select>
    ${mkSel('fStatus',STATUS_OPTS,state.filterStatus,'상태')}
    ${mkSel('fImportance',IMP_OPTS,state.filterImportance,'중요도')}
    <div class="filter-divider"></div>
    ${DA.getTags().slice(0,5).map(t=>`<button class="tag-btn${state.selTag===t.id?' active':''}" data-tag="${t.id}" style="${state.selTag===t.id?`border-color:${t.color};background:${t.color}18;color:${t.color}`:''}">${esc(t.name)}</button>`).join('')}
    ${hasFilter?'<button class="filter-reset" id="resetFilters">초기화</button>':''}
    <div class="filter-divider"></div><label style="display:flex;align-items:center;gap:5px;font-size:11px;color:#475569;cursor:pointer;white-space:nowrap"><button class="toggle${state.hideCompleted?' on':''}" id="toggleCompleted"></button>유효건만</label>
    <span class="filter-count">${allDocs.length}건</span>
  </div>
  <table class="doc-table">
    <thead><tr>
      <th style="width:30px"><input type="checkbox" class="table-checkbox" id="checkAll"></th>
      <th data-sort="title">문서명 ${sortArrow('title')}</th>
      <th style="width:80px" data-sort="docType">문서유형 ${sortArrow('docType')}</th>
      <th style="width:65px" data-sort="workCat">업무분류 ${sortArrow('workCat')}</th>
      <th style="width:100px">관련 사건</th>
      <th style="width:60px" data-sort="owner">담당자 ${sortArrow('owner')}</th>
      <th style="width:85px" data-sort="date">일자 ${sortArrow('date')}</th>
      <th style="width:65px" data-sort="status">상태 ${sortArrow('status')}</th>
      <th style="width:35px" data-sort="importance">★ ${sortArrow('importance')}</th>
      <th style="width:35px">메모</th>
      <th style="width:55px">SP</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  ${allDocs.length===0?'<div class="empty-msg">검색 결과가 없습니다</div>':''}
  ${paginationHtml}`;
}

function saveDocFromModal() {
  const title=document.getElementById('fm_title').value.trim();
  if(!title){toast('문서 제목을 입력하세요.','error');return;}
  const catId=document.getElementById('fm_catId').value;
  if(!catId){toast('카테고리를 선택하세요.','error');return;}

  const tagEls=document.querySelectorAll('.form-tag.selected');
  const tagIds=Array.from(tagEls).map(el=>el.dataset.ftag);
  const partiesStr=document.getElementById('fm_parties').value;
  const parties=partiesStr?partiesStr.split(',').map(s=>s.trim()).filter(Boolean):[];

  const data={
    title, fileName:document.getElementById('fm_fileName').value||title, ext:document.getElementById('fm_ext').value,
    catId, docType:document.getElementById('fm_docType').value, workCat:document.getElementById('fm_workCat').value,
    matterName:document.getElementById('fm_matterName').value||null,
    date:document.getElementById('fm_date').value, owner:document.getElementById('fm_owner').value,
    importance:document.getElementById('fm_importance').value, status:document.getElementById('fm_status').value,
    conf:document.getElementById('fm_conf').value, parties, tagIds,
    spPath:document.getElementById('fm_spPath').value, size:parseInt(document.getElementById('fm_size').value)||0,
    body:document.getElementById('fm_body').value,
  };

  if(state.editDocId){
    DA.updateDoc(state.editDocId, data);
    toast('문서 정보가 수정되었습니다.');
    if(state.selDoc&&state.selDoc.id===state.editDocId) state.selDoc=DA.getDoc(state.editDocId);
  } else {
    // 신규 등록 — SP 연결 시 Graph API로 파일 업로드 후 메타데이터 저장
    // PUT /drives/{driveId}/items/{folderId}:/{fileName}:/content
    DA.addDoc(data);
    toast('문서가 등록되었습니다. (SP 연결 시 파일이 SharePoint에 업로드됩니다)');
  }
  setState({showDocModal:false, editDocId:null});
}

// SP 전환 시: 이 함수는 그대로 사용 가능 (DA.getDoc/getDocMemo는 SP REST API로 교체됨)
function exportCSV(docIds) {
  const header = ['문서명','문서유형','업무분류','관련사건','담당자','문서일자','상태','중요도','기밀등급','SP경로','태그','출처','핵심쟁점','실무판단','리스크포인트','향후참고'];
  const rows = docIds.map(id => {
    const d = DA.getDoc(id); if(!d) return null;
    const m = DA.getDocMemo(id)||{};
    const tags = getTagObjs(d.tagIds||[]).map(t=>t.name).join('|');
    const confMap = {public:'공개', internal:'사내', confidential:'기밀'};
    const cell = v => `"${String(v||'').replace(/"/g,'""')}"`;
    return [
      cell(d.title), cell(d.docType), cell(d.workCat), cell(d.matterName||''),
      cell(userName(d.owner)), cell(fdate(d.date)), cell(d.status), cell(d.importance),
      cell(confMap[d.conf]||d.conf), cell(d.spPath||''), cell(tags),
      cell(d.source==='local'?'직접등록':'SP동기화'),
      cell(m.issue||''), cell(m.judgment||''), cell(m.risk||''), cell(m.future||'')
    ].join(',');
  }).filter(Boolean);

  const bom = '\uFEFF'; // Excel UTF-8 BOM
  const csv = bom + [header.map(h=>`"${h}"`).join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `법무문서_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`${docIds.length}건 CSV 내보내기 완료`);
}

function renderCaseSummary(){
  const catId=state.caseSummary;
  const cat=DA.getCats().find(c=>c.id===catId);
  if(!cat) return '<div class="empty-msg">카테고리를 찾을 수 없습니다.</div>';
  const docs=DA.getDocs().filter(d=>d.catId===catId).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const caseNotes=DA.getCaseNotes(catId);
  const pinnedNotes=caseNotes.filter(n=>n.pinned);
  const parent=DA.getCats().find(c=>c.id===cat.parentId);
  const ai=DA.getAISummary(catId);
  const autoParties=[...new Set(docs.flatMap(d=>d.parties||[]).filter(p=>p!=='당사'))];
  const autoLawFirms=autoParties.filter(p=>p.includes('법무법인'));
  const statusColors={'진행중':'#d97706','완료':'#16a34a','검토중':'#d97706','참고자료':'#64748b','높음':'#dc2626','중간':'#d97706','낮음':'#16a34a'};
  // 사건 정보는 카테고리 객체에서 읽음
  const summary=ai?ai.summary:(cat.caseSummary||'');
  const status=ai?ai.status:(cat.caseStatus||'');
  const keyIssues=ai?ai.keyIssues:[];
  const nextActions=ai?ai.nextActions:[];
  const riskLevel=ai?ai.riskLevel:null;
  const hasAz=!!(DA.getAzConfig().endpoint&&DA.getAzConfig().apiKey);
  const chatHist=DA.getChatHistory(catId);

  return `<button class="back-btn" id="backFromCase">&larr; ${parent?esc(parent.name):'문서 목록'}으로 돌아가기</button>
  <div class="case-header">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px"><h2>${esc(cat.name)}</h2>
        ${status?`<span class="badge" style="background:${statusColors[status]||'#64748b'}20;color:${statusColors[status]||'#64748b'}">${status}</span>`:''}
        ${riskLevel?`<span class="badge" style="background:${statusColors[riskLevel]||'#64748b'}20;color:${statusColors[riskLevel]||'#64748b'}">위험도: ${riskLevel}</span>`:''}</div>
      <div style="display:flex;gap:6px">
        ${isAdmin()?`<button class="btn-secondary" id="editCaseInfoBtn">사건 정보 수정</button>`:''}
        <button class="btn-primary" id="aiSummaryBtn" ${state.aiLoading?'disabled':''}>${state.aiLoading?'분석 중...':(ai?'AI 재생성':'AI 요약 생성')}</button>
      </div>
    </div>
    ${!hasAz?'<div style="font-size:10px;color:#94a3b8;margin-bottom:6px">설정 > AI 연동에서 Azure OpenAI를 설정하면 AI 요약을 사용할 수 있습니다.</div>':''}
    <div class="case-meta">
      ${cat.casePeriod?`<div class="case-meta-item"><span class="cml">기간</span>${esc(cat.casePeriod)}</div>`:''}
      ${cat.caseManager?`<div class="case-meta-item"><span class="cml">담당자</span>${esc(userName(cat.caseManager))}</div>`:''}
      ${(cat.caseLawFirm||autoLawFirms.length)?`<div class="case-meta-item"><span class="cml">외부법무법인</span>${esc(cat.caseLawFirm||(autoLawFirms.join(', ')))}</div>`:''}
      <div class="case-meta-item"><span class="cml">문서</span>${docs.length}건</div>
      ${autoParties.length?`<div class="case-meta-item"><span class="cml">관련 당사자</span>${esc(autoParties.join(', '))}</div>`:''}
    </div>
    ${state.aiLoading?`<div style="padding:16px;text-align:center;color:#3b82f6;font-size:12px">AI가 문서 ${docs.length}건을 분석하고 있습니다...</div>`:
    summary?`<div class="case-summary-text">${ai?'<div style="font-size:9px;color:#3b82f6;margin-bottom:4px">AI 생성 요약</div>':''}${esc(summary)}</div>`:
    `<div style="padding:12px;text-align:center;color:#94a3b8;font-size:12px">AI 요약 생성 버튼을 눌러 문서 기반 요약을 자동 생성하세요.</div>`}
  </div>
  ${keyIssues.length>0?`<div class="card" style="margin-bottom:14px"><h3>${ai?'AI 분석 - 핵심 이슈':'핵심 이슈'}</h3><ul style="padding-left:16px;margin:0">${keyIssues.map(i=>`<li style="font-size:11px;color:#475569;margin-bottom:5px;line-height:1.6">${esc(i)}</li>`).join('')}</ul></div>`:''}
  ${nextActions.length>0?`<div class="card" style="margin-bottom:14px;border-color:#bfdbfe"><h3 style="color:#1e40af">AI 권고 - 다음 조치사항</h3><ul style="padding-left:16px;margin:0">${nextActions.map(a=>`<li style="font-size:11px;color:#475569;margin-bottom:5px;line-height:1.6">${esc(a)}</li>`).join('')}</ul></div>`:''}
  <div class="card" style="margin-bottom:14px"><h3>주요 문서 (${docs.length}건)</h3>
    ${(()=>{
      const starred=docs.filter(d=>d.importance==='High');
      const rest=docs.filter(d=>d.importance!=='High');
      const renderDocCard=(d,isStarred)=>{const c=fcolor(d.ext);const tags=getTagObjs(d.tagIds);const memo=DA.getDocMemo(d.id);const hasMemo=!!(memo.issue||memo.judgment||memo.risk||memo.future);
        return`<div class="recent-item" data-doc="${d.id}"><div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
          <div class="file-icon" style="min-width:28px;height:28px;background:${c}15;color:${c};font-size:8px;flex-shrink:0">${ficon(d.ext)}</div>
          <div style="min-width:0"><div style="display:flex;align-items:center;gap:4px"><span style="color:${isStarred?'#f59e0b':'#e2e8f0'};font-size:12px">${isStarred?'★':'☆'}</span><span class="title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.title)}</span></div>
          <div style="display:flex;gap:3px;margin-top:1px;align-items:center">${docTypeBadge(d.docType)} <span style="font-size:10px;color:#94a3b8">${fdate(d.date)}</span>${hasMemo?'<span class="note-indicator" style="margin-left:2px">M</span>':''}
          ${tags.slice(0,2).map(t=>`<span class="tag" style="background:${t.color}18;color:${t.color}">${esc(t.name)}</span>`).join('')}</div></div>
        </div><span style="font-size:10px;color:#94a3b8">${esc(userName(d.owner))}</span></div>`;};
      let html='';
      if(starred.length>0){html+=`<div style="font-size:10px;font-weight:600;color:#f59e0b;margin-bottom:4px">★ 중요 문서</div>`;html+=starred.map(d=>renderDocCard(d,true)).join('');}
      if(rest.length>0){html+=`<div style="font-size:10px;font-weight:600;color:#64748b;margin-top:${starred.length?8:0}px;margin-bottom:4px">일반 문서</div>`;html+=rest.map(d=>renderDocCard(d,false)).join('');}
      if(docs.length===0) html='<div style="padding:16px;text-align:center;color:#94a3b8;font-size:12px">문서가 없습니다.</div>';
      return html;
    })()}
  </div>
  <div class="card" style="margin-bottom:14px">
    <h3>AI에게 이 사건에 대해 질문하기</h3>
    <div id="chatMessages">${chatHist.map(m=>`<div class="chat-msg${m.role==='user'?' user':''}">${m.role==='assistant'?'<div class="chat-avatar ai">AI</div>':''}<div class="chat-bubble ${m.role==='user'?'user':'ai'}">${esc(m.content)}</div>${m.role==='user'?'<div class="chat-avatar user">KH</div>':''}</div>`).join('')}
      ${state.chatLoading?'<div class="chat-msg"><div class="chat-avatar ai">AI</div><div class="chat-bubble ai" style="color:#94a3b8">답변을 생성하고 있습니다...</div></div>':''}</div>
    ${!chatHist.length&&!state.chatLoading?`<div style="padding:10px;text-align:center;color:#94a3b8;font-size:11px;margin-bottom:8px">사건의 문서와 메모를 기반으로 AI에게 질문할 수 있습니다.
      <div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:6px">
        <button class="chat-suggest">이 사건의 핵심 리스크는?</button>
        <button class="chat-suggest">현재까지 진행 경과를 정리해줘</button>
        <button class="chat-suggest">다음에 해야 할 일은?</button></div></div>`:''}
    <div style="display:flex;gap:6px">
      <input type="text" id="chatInput" placeholder="이 사건에 대해 질문하세요..." style="flex:1;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none">
      <button class="btn-primary" id="chatSendBtn" ${state.chatLoading?'disabled':''}>전송</button>
    </div>
    ${!DA.getAzConfig().apiKey?'<div style="font-size:10px;color:#94a3b8;margin-top:4px">설정 > AI 연동에서 Azure OpenAI를 설정해야 사용할 수 있습니다.</div>':''}
  </div>
  <div class="key-notes">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="margin:0">사건 메모 (${caseNotes.length})</h3>
      ${canEdit()?`<button class="btn-primary" id="addCaseNoteBtn">+ 메모 추가</button>`:''}
    </div>
    ${state.addingNote?renderCaseNoteForm(docs):''}
    ${pinnedNotes.length>0?`<div style="font-size:10px;font-weight:700;color:#d97706;margin-bottom:6px">고정 메모</div>
      ${pinnedNotes.map(n=>renderCaseNoteCard(n,docs)).join('')}`:''}
    ${caseNotes.filter(n=>!n.pinned).length>0?`<div style="font-size:10px;font-weight:700;color:#64748b;margin-top:${pinnedNotes.length?10:0}px;margin-bottom:6px">일반 메모</div>
      ${caseNotes.filter(n=>!n.pinned).map(n=>renderCaseNoteCard(n,docs)).join('')}`:''}
    ${caseNotes.length===0&&!state.addingNote?'<div style="text-align:center;padding:16px;color:#94a3b8;font-size:12px">아직 메모가 없습니다.</div>':''}
  </div>`;
}

function renderCaseNoteForm(docs) {
  const isEditing=!!state.editingNoteId;
  const note=isEditing?DA.getCaseNotes().find(n=>n.id===state.editingNoteId):{};
  return `<div style="padding:12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;margin-bottom:12px">
    <select id="caseNoteDoc" style="width:100%;padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;margin-bottom:6px">
      <option value="">문서 선택 (선택)</option>${docs.map(d=>`<option value="${d.id}"${note.docId===d.id?' selected':''}>${esc(d.title)}</option>`).join('')}</select>
    <input type="text" id="caseNoteTitle" placeholder="메모 제목" value="${esc(note.title||'')}" style="width:100%;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;margin-bottom:6px;outline:none">
    <textarea id="caseNoteContent" rows="3" style="width:100%;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;resize:vertical;outline:none;font-family:inherit" placeholder="사건 메모를 작성하세요...">${esc(note.content||'')}</textarea>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
      <label style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer"><input type="checkbox" id="caseNotePinned" ${note.pinned?'checked':''} style="accent-color:#d97706"> 고정 메모</label>
      <div style="flex:1"></div>
      <button class="btn-secondary" id="cancelCaseNote">취소</button>
      <button class="btn-primary" id="saveCaseNote">${isEditing?'수정 저장':'저장'}</button>
    </div>
  </div>`;
}

function renderCaseNoteCard(n, docs) {
  const docTitle=docs.find(d=>d.id===n.docId);
  return `<div class="note-card${n.pinned?' pinned':''}">
    <div class="note-head">
      <div style="display:flex;align-items:center;gap:5px">${n.pinned?'<span style="color:#d97706">★</span>':''}<span class="note-title">${esc(n.title)}</span></div>
      <div style="display:flex;align-items:center">
        <span class="note-date">${fdatetime(n.date)}</span>
        ${canEdit()?`<div class="note-actions">
          <button class="btn-icon" data-edit-note="${n.id}" title="수정" style="padding:2px">${IC.edit}</button>
          <button class="btn-icon" data-delete-note="${n.id}" title="삭제" style="padding:2px;color:#dc2626">${IC.trash}</button>
        </div>`:''}
      </div>
    </div>
    ${docTitle?`<div style="font-size:9px;color:#3b82f6;margin-bottom:2px">${esc(docTitle.title)}</div>`:''}
    <div class="note-body">${esc(n.content)}</div>
    <div class="note-author">작성자: ${esc(userName(n.author))}</div>
  </div>`;
}

function renderSettings(){

function renderFolderTree(){
  const folders=[{name:'법무',depth:0,selected:true,hasKids:true},{name:'2026',depth:1,hasKids:true},{name:'CP사건 (공정거래)',depth:2},{name:'M&A건 (DEF인수)',depth:2},{name:'노동소송건',depth:2},

    {name:'2024',depth:1,hasKids:true},{name:'이사회자료',depth:1,hasKids:true},{name:'규정',depth:1}];
  return folders.map(f=>`<div class="folder-node${f.selected?' selected':''}" style="padding-left:${f.depth*16+6}px">
    <span style="width:10px;font-size:8px;display:flex">${f.hasKids?IC.chevRight:''}</span>${f.selected?IC.folder:IC.folder} ${esc(f.name)}${f.selected?'<span class="root-badge">루트</span>':''}</div>`).join('');
}
