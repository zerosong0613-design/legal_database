// EVENT BINDINGS
// ════════════════════════════════════════════════════════
function bindEvents(){
  // User menu
  const avatarBtn=document.getElementById('userAvatarBtn');
  if(avatarBtn) avatarBtn.onclick=(e)=>{e.stopPropagation();setState({showUserMenu:!state.showUserMenu});};
  const umGoMine=document.getElementById('umGoMine');
  if(umGoMine) umGoMine.onclick=(e)=>{e.stopPropagation();setState({page:'mine',selCat:null,caseSummary:null,selDoc:null,showUserMenu:false});};
  const umGoSettings=document.getElementById('umGoSettings');
  if(umGoSettings) umGoSettings.onclick=(e)=>{e.stopPropagation();setState({page:'settings',selCat:null,caseSummary:null,selDoc:null,showUserMenu:false});};
  // Close user menu on outside click
  if(state.showUserMenu){
    setTimeout(()=>{document.addEventListener('click',function closeMenu(e){
      const wrap=document.getElementById('userMenuWrap');
      if(!wrap||!wrap.contains(e.target)){state.showUserMenu=false;render();}
      document.removeEventListener('click',closeMenu);
    });},0);
  }
  // Mobile menu
  const menuToggle=document.getElementById('menuToggle');
  if(menuToggle) menuToggle.onclick=()=>setState({sidebarOpen:!state.sidebarOpen});
  const sidebarOverlay=document.getElementById('sidebarOverlay');
  if(sidebarOverlay) sidebarOverlay.onclick=()=>setState({sidebarOpen:false});
  // Logo → dashboard
  const logoHome=document.getElementById('logoHome');
  if(logoHome) logoHome.onclick=()=>setState({page:'dashboard',selCat:null,selTag:null,selDoc:null,search:'',caseSummary:null,memoEditing:false,detailEditing:false,currentPage:1,selectedDocs:new Set(),sidebarOpen:false});
  // Nav
  document.querySelectorAll('.nav-item[data-page]').forEach(el=>el.onclick=()=>{
    const pg=el.dataset.page;
    setState({page:pg,selCat:null,selTag:null,selDoc:null,search:'',addingNote:false,caseSummary:null,memoEditing:false,detailEditing:false,currentPage:1,selectedDocs:new Set(),editingNoteId:null,sidebarOpen:false});
  });
  // Cat
  document.querySelectorAll('.cat-item[data-cat]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.cat;const toggle=el.dataset.toggle;
    if(toggle) state.expandedCats[toggle]=!state.expandedCats[toggle];
    const cat=DA.getCats().find(c=>c.id===id);
    const hasCaseInfo=cat&&cat.parentId&&(cat.caseSummary||cat.caseStatus||cat.caseManager);
    if(hasCaseInfo) setState({selCat:id,caseSummary:id,page:'documents',selDoc:null,memoEditing:false,currentPage:1,selectedDocs:new Set(),sidebarOpen:false});
    else if(cat&&cat.parentId) setState({selCat:id,caseSummary:null,page:'documents',selDoc:null,memoEditing:false,currentPage:1,selectedDocs:new Set(),sidebarOpen:false});
    else setState({selCat:state.selCat===id?null:id,caseSummary:null,page:'documents',memoEditing:false,currentPage:1,selectedDocs:new Set()});
  });
  // Search
  const si=document.getElementById('searchInput');
  if(si){si.oninput=()=>setState({search:si.value,page:si.value?'documents':state.page,selCat:si.value?null:state.selCat,caseSummary:si.value?null:state.caseSummary,currentPage:1});}
  // Filters
  const fMap={fDocType:'filterDocType',fWorkCat:'filterWorkCat',fOwner:'filterOwner',fStatus:'filterStatus',fImportance:'filterImportance'};
  Object.entries(fMap).forEach(([elId,sk])=>{const el=document.getElementById(elId);if(el)el.onchange=()=>setState({[sk]:el.value,currentPage:1});});
  const rr=document.getElementById('resetFilters');
  if(rr)rr.onclick=()=>setState({filterDocType:'전체',filterWorkCat:'전체',filterStatus:'전체',filterImportance:'전체',filterOwner:'전체',selTag:null,currentPage:1});
  document.querySelectorAll('.tag-btn[data-tag]').forEach(el=>el.onclick=()=>setState({selTag:state.selTag===el.dataset.tag?null:el.dataset.tag,currentPage:1}));
  // Hide completed toggle
  const toggleCompleted=document.getElementById('toggleCompleted');
  if(toggleCompleted) toggleCompleted.onclick=()=>setState({hideCompleted:!state.hideCompleted});
  // Group toggle
  document.querySelectorAll('[data-toggle-group]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.toggleGroup;
    state.expandedCats[id]=state.expandedCats[id]===false?true:false;
    render();
  });
  // Sort
  document.querySelectorAll('th[data-sort]').forEach(el=>el.onclick=()=>{
    const col=el.dataset.sort;
    if(state.sortCol===col) setState({sortDir:state.sortDir==='asc'?'desc':'asc'});
    else setState({sortCol:col,sortDir:'asc'});
  });
  // Pagination
  document.querySelectorAll('[data-ppage]').forEach(el=>el.onclick=()=>setState({currentPage:parseInt(el.dataset.ppage)}));
  // Checkboxes
  const checkAll=document.getElementById('checkAll');
  if(checkAll) checkAll.onchange=()=>{
    const docs=getFilteredDocs();const start=(state.currentPage-1)*state.pageSize;
    const pageDocs=docs.slice(start,start+state.pageSize);
    const sel=new Set(state.selectedDocs);
    if(checkAll.checked) pageDocs.forEach(d=>sel.add(d.id)); else pageDocs.forEach(d=>sel.delete(d.id));
    setState({selectedDocs:sel});
  };
  document.querySelectorAll('.table-checkbox[data-check]').forEach(el=>el.onchange=()=>{
    const sel=new Set(state.selectedDocs);
    if(el.checked)sel.add(el.dataset.check);else sel.delete(el.dataset.check);
    setState({selectedDocs:sel});
  });
  // Bulk actions
  const bulkClear=document.getElementById('bulkClear');
  if(bulkClear) bulkClear.onclick=()=>setState({selectedDocs:new Set()});

  // Bulk: 담당자 변경
  const bulkOwnerBtn=document.getElementById('bulkOwnerBtn');
  if(bulkOwnerBtn) bulkOwnerBtn.onclick=()=>setState({showBulkOwner:true});
  const closeBulkOwner=document.getElementById('closeBulkOwner');
  if(closeBulkOwner) closeBulkOwner.onclick=()=>setState({showBulkOwner:false});
  const closeBulkOwner2=document.getElementById('closeBulkOwner2');
  if(closeBulkOwner2) closeBulkOwner2.onclick=()=>setState({showBulkOwner:false});
  document.getElementById('bulkOwnerOverlay')?.addEventListener('click',e=>{if(e.target.id==='bulkOwnerOverlay')setState({showBulkOwner:false});});
  const saveBulkOwner=document.getElementById('saveBulkOwner');
  if(saveBulkOwner) saveBulkOwner.onclick=()=>{
    const newOwner=document.getElementById('bulkOwnerSelect').value;
    if(!newOwner){toast('담당자를 선택하세요.','error');return;}
    let cnt=0;
    state.selectedDocs.forEach(id=>{DA.updateDoc(id,{owner:newOwner});cnt++;});
    toast(`${cnt}건의 담당자가 변경되었습니다.`);
    setState({showBulkOwner:false, selectedDocs:new Set()});
  };

  // Bulk: 태그 추가
  const bulkTagBtn=document.getElementById('bulkTagBtn');
  if(bulkTagBtn) bulkTagBtn.onclick=()=>setState({showBulkTag:true});
  const closeBulkTag=document.getElementById('closeBulkTag');
  if(closeBulkTag) closeBulkTag.onclick=()=>setState({showBulkTag:false});
  const closeBulkTag2=document.getElementById('closeBulkTag2');
  if(closeBulkTag2) closeBulkTag2.onclick=()=>setState({showBulkTag:false});
  document.getElementById('bulkTagOverlay')?.addEventListener('click',e=>{if(e.target.id==='bulkTagOverlay')setState({showBulkTag:false});});
  const saveBulkTag=document.getElementById('saveBulkTag');
  if(saveBulkTag) saveBulkTag.onclick=()=>{
    const checked=[...document.querySelectorAll('.bulk-tag-check:checked')].map(el=>el.value);
    let cnt=0;
    state.selectedDocs.forEach(id=>{
      const d=DA.getDoc(id); if(!d) return;
      const existing=new Set(d.tagIds||[]);
      checked.forEach(t=>existing.add(t));
      DA.updateDoc(id,{tagIds:[...existing]});
      cnt++;
    });
    toast(`${cnt}건에 태그가 적용되었습니다.`);
    setState({showBulkTag:false, selectedDocs:new Set()});
  };

  // Bulk: CSV 내보내기
  const bulkExportBtn=document.getElementById('bulkExportBtn');
  if(bulkExportBtn) bulkExportBtn.onclick=()=>exportCSV([...state.selectedDocs]);

  // Bulk: 삭제 (source==='local' 문서만)
  const bulkDeleteBtn=document.getElementById('bulkDeleteBtn');
  if(bulkDeleteBtn) bulkDeleteBtn.onclick=()=>{
    const localIds=[...state.selectedDocs].filter(id=>{const d=DA.getDoc(id);return d&&d.source==='local';});
    const spIds=state.selectedDocs.size-localIds.length;
    const msg=`직접 등록한 문서 ${localIds.length}건을 삭제합니다.${spIds>0?`\nSP 동기화 문서 ${spIds}건은 삭제 대상에서 제외됩니다.`:''}`;
    setState({showConfirm:{title:'문서 삭제', message:msg, okText:'삭제', onConfirm:()=>{
      localIds.forEach(id=>DA.deleteDoc(id));
      toast(`${localIds.length}건이 삭제되었습니다.`);
      setState({showConfirm:null, selectedDocs:new Set(), selDoc:null});
    }}});
  };
  // Doc row click → detail
  document.querySelectorAll('tr[data-doc]').forEach(el=>el.onclick=()=>{const doc=DA.getDoc(el.dataset.doc);if(doc)setState({selDoc:doc,selMemoTab:'issue',memoEditing:false,detailEditing:false});});
  document.querySelectorAll('.recent-item[data-doc]').forEach(el=>el.onclick=()=>{const doc=DA.getDoc(el.dataset.doc);if(doc)setState({selDoc:doc,selMemoTab:'issue',memoEditing:false,page:'documents'});});
  document.querySelectorAll('[data-case-cat]').forEach(el=>el.onclick=()=>{const id=el.dataset.caseCat;setState({selCat:id,caseSummary:id,page:'documents',selDoc:null});});
  document.querySelectorAll('.tl-card[data-doc]').forEach(el=>el.onclick=()=>{const doc=DA.getDoc(el.dataset.doc);if(doc)setState({selDoc:doc,selMemoTab:'issue',memoEditing:false});});
  document.querySelectorAll('.related-doc-item[data-doc]').forEach(el=>el.onclick=()=>{const doc=DA.getDoc(el.dataset.doc);if(doc)setState({selDoc:doc,selMemoTab:'issue',memoEditing:false});});
  // Detail panel
  const ov=document.getElementById('overlay');if(ov)ov.onclick=()=>setState({selDoc:null,memoEditing:false,detailEditing:false});
  const cb=document.getElementById('closeDetail');if(cb)cb.onclick=()=>setState({selDoc:null,memoEditing:false,detailEditing:false});
  // Star toggle in table
  document.querySelectorAll('.star-btn[data-star]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.star;const doc=DA.getDoc(id);if(!doc)return;
    const newImp=doc.importance==='High'?'Medium':'High';
    DA.updateDoc(id,{importance:newImp});
    toast(newImp==='High'?'중요 문서로 표시되었습니다.':'중요 표시가 해제되었습니다.');
    render();
  });
  // Star toggle in detail panel
  const detailStar=document.getElementById('detailStarBtn');
  if(detailStar&&state.selDoc) detailStar.onclick=()=>{
    const newImp=state.selDoc.importance==='High'?'Medium':'High';
    DA.updateDoc(state.selDoc.id,{importance:newImp});
    state.selDoc=DA.getDoc(state.selDoc.id);
    toast(newImp==='High'?'중요 문서로 표시되었습니다.':'중요 표시가 해제되었습니다.');
    render();
  };
  // Detail edit/delete
  const editDocBtn=document.getElementById('editDocBtn');
  if(editDocBtn) editDocBtn.onclick=()=>setState({showDocModal:true,editDocId:state.selDoc.id});
  const deleteDocBtn=document.getElementById('deleteDocBtn');
  if(deleteDocBtn&&state.selDoc) deleteDocBtn.onclick=()=>{
    setState({showConfirm:{title:'문서 삭제', message:`"${state.selDoc.title}"을(를) 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`, okText:'삭제', onConfirm:()=>{
      const id=state.selDoc.id;
      DA.deleteDoc(id);
      toast('문서가 삭제되었습니다.');
      setState({showConfirm:null, selDoc:null, selectedDocs:new Set()});
    }}});
  };
  // Memo tabs
  document.querySelectorAll('[data-memo-tab]').forEach(el=>el.onclick=()=>setState({selMemoTab:el.dataset.memoTab,memoEditing:false}));
  const aiMemoBtn=document.getElementById('aiMemoBtn');
  if(aiMemoBtn&&state.selDoc) aiMemoBtn.onclick=()=>generateDocMemo(state.selDoc.id);
  const editMemo=document.getElementById('editMemo');if(editMemo)editMemo.onclick=()=>setState({memoEditing:true});
  const cancelMemo=document.getElementById('cancelMemo');if(cancelMemo)cancelMemo.onclick=()=>setState({memoEditing:false});
  const saveMemo=document.getElementById('saveMemo');
  if(saveMemo)saveMemo.onclick=()=>{const ta=document.getElementById('memoTextarea');if(ta&&state.selDoc){const cur=DA.getDocMemo(state.selDoc.id);cur[state.selMemoTab]=ta.value;DA.setDocMemo(state.selDoc.id,cur);toast('메모가 저장되었습니다.');setState({memoEditing:false});}};
  // Doc Modal
  const openModal=document.getElementById('openDocModal');if(openModal)openModal.onclick=()=>setState({showDocModal:true,editDocId:null});
  const syncNow=document.getElementById('syncNowBtn');
  if(syncNow) syncNow.onclick=()=>{syncNow.textContent='동기화 중...';syncNow.disabled=true;setTimeout(()=>{toast('SharePoint 동기화가 완료되었습니다.');syncNow.innerHTML='<span class="sync-dot"></span>동기화';syncNow.disabled=false;},1000);};
  const closeModal=document.getElementById('closeDocModal');if(closeModal)closeModal.onclick=()=>setState({showDocModal:false,editDocId:null});
  const closeModal2=document.getElementById('closeDocModal2');if(closeModal2)closeModal2.onclick=()=>setState({showDocModal:false,editDocId:null});
  const modalOverlay=document.getElementById('modalOverlay');if(modalOverlay)modalOverlay.onclick=(e)=>{if(e.target===modalOverlay)setState({showDocModal:false,editDocId:null});};
  const saveModal=document.getElementById('saveDocModal');if(saveModal)saveModal.onclick=saveDocFromModal;
  // Tag toggle in modal
  // File input auto-fill
  const fmFile=document.getElementById('fm_file');
  if(fmFile) fmFile.onchange=()=>{
    const file=fmFile.files[0];if(!file)return;
    const label=document.getElementById('fm_file_label');
    if(label) label.textContent=file.name+' ('+fmt(file.size)+')';
    const titleInput=document.getElementById('fm_title');
    const fnInput=document.getElementById('fm_fileName');
    const extSelect=document.getElementById('fm_ext');
    const sizeInput=document.getElementById('fm_size');
    if(fnInput&&!fnInput.value) fnInput.value=file.name;
    if(titleInput&&!titleInput.value) titleInput.value=file.name.replace(/\.[^.]+$/,'');
    if(sizeInput) sizeInput.value=file.size;
    const ext=file.name.split('.').pop().toLowerCase();
    if(extSelect){const opt=Array.from(extSelect.options).find(o=>o.value===ext);if(opt)extSelect.value=ext;}
  };
  // Tag toggle in modal
  document.querySelectorAll('.form-tag[data-ftag]').forEach(el=>el.onclick=()=>{el.classList.toggle('selected');const t=DA.getTags().find(t=>t.id===el.dataset.ftag);if(t){if(el.classList.contains('selected')){el.style.background=t.color+'18';el.style.color=t.color;el.style.borderColor=t.color;}else{el.style.background='';el.style.color='';el.style.borderColor='';}}});
  // Confirm dialog
  const confirmCancel=document.getElementById('confirmCancel');if(confirmCancel)confirmCancel.onclick=()=>setState({showConfirm:null});
  const confirmOk=document.getElementById('confirmOk');if(confirmOk)confirmOk.onclick=()=>{if(state.showConfirm&&state.showConfirm.onConfirm)state.showConfirm.onConfirm();};
  const confirmOverlay=document.getElementById('confirmOverlay');if(confirmOverlay)confirmOverlay.onclick=(e)=>{if(e.target===confirmOverlay)setState({showConfirm:null});};
  // Settings tabs
  document.querySelectorAll('.tab-btn[data-stab]').forEach(el=>el.onclick=()=>setState({settingsTab:el.dataset.stab}));
  const conBtn=document.getElementById('connectBtn');if(conBtn)conBtn.onclick=()=>{conBtn.textContent='연결 중...';conBtn.disabled=true;setTimeout(()=>{setState({spConnected:true});toast('SharePoint에 연결되었습니다.');},800);};
  const createLists=document.getElementById('createSPLists');
  if(createLists)createLists.onclick=()=>{createLists.textContent='생성 중...';createLists.disabled=true;setTimeout(()=>{toast('SharePoint Lists 6개가 생성되었습니다. (LKA_DocMeta, LKA_DocMemos, LKA_CaseNotes, LKA_Tags, LKA_Categories, LKA_Users)');createLists.textContent='리스트 자동 생성';createLists.disabled=false;},1200);};
  const migBtn=document.getElementById('migrateTeSP');
  if(migBtn)migBtn.onclick=()=>{migBtn.textContent='마이그레이션 중...';migBtn.disabled=true;setTimeout(()=>{toast('localStorage 데이터가 SharePoint Lists로 마이그레이션되었습니다.');migBtn.textContent='localStorage → SP 마이그레이션';migBtn.disabled=false;},1500);};
  // Users CRUD
  document.querySelectorAll('.user-role-select').forEach(el=>el.onchange=()=>{
    DA.updateUserRole(el.dataset.userId,el.value);
    const roleNames={admin:'관리자',editor:'편집자',viewer:'뷰어'};
    toast(`권한이 ${roleNames[el.value]}(으)로 변경되었습니다.`);
    setState({});
  });
  document.querySelectorAll('[data-remove-user]').forEach(el=>el.onclick=()=>{
    const userId=el.dataset.removeUser;
    const user=DA.getUsers().find(u=>u.id===userId);
    setState({showConfirm:{title:'사용자 제거',message:`${user?esc(user.name):''}을(를) 시스템에서 제거하시겠습니까?`,onConfirm:()=>{DA.removeUser(userId);toast('사용자가 제거되었습니다.');setState({showConfirm:null});}}});
  });
  const addUserBtn=document.getElementById('addUserBtn');
  if(addUserBtn) addUserBtn.onclick=()=>{
    const name=document.getElementById('newUserName').value.trim();
    const email=document.getElementById('newUserEmail').value.trim();
    const role=document.getElementById('newUserRole').value;
    if(!name||!email){toast('이름과 이메일을 입력하세요.','error');return;}
    DA.addUser({name,email,dept:'법무팀',role,lastLogin:''});
    toast(`${name}이(가) ${({admin:'관리자',editor:'편집자',viewer:'뷰어'})[role]}(으)로 추가되었습니다.`);
    setState({});
  };
  // Tags CRUD
  const addTagBtn=document.getElementById('addTagBtn');
  if(addTagBtn) addTagBtn.onclick=()=>{const name=document.getElementById('newTagName').value.trim();const color=document.getElementById('newTagColor').value;if(!name){toast('태그 이름을 입력하세요.','error');return;}DA.addTag({name,color});toast('태그가 추가되었습니다.');setState({});};
  document.querySelectorAll('[data-delete-tag]').forEach(el=>el.onclick=()=>{DA.deleteTag(el.dataset.deleteTag);toast('태그가 삭제되었습니다.');setState({});});
  // Categories CRUD
  const addCatBtn=document.getElementById('addCatBtn');
  if(addCatBtn) addCatBtn.onclick=()=>{
    const name=document.getElementById('newCatName').value.trim();
    const parentId=document.getElementById('newCatParent').value||null;
    if(!name){toast('사건/사무명을 입력하세요.','error');return;}
    DA.addCat({name,parentId,
      caseStatus:document.getElementById('newCatStatus')?.value||'',
      casePeriod:document.getElementById('newCatPeriod')?.value||'',
      caseManager:document.getElementById('newCatManager')?.value||'',
      caseLawFirm:document.getElementById('newCatLawFirm')?.value||'',
      caseSummary:''});
    toast('사건/사무가 추가되었습니다.');setState({});
  };
  // Case Summary
  const backBtn=document.getElementById('backFromCase');
  if(backBtn) backBtn.onclick=()=>{const cat=DA.getCats().find(c=>c.id===state.caseSummary);setState({caseSummary:null,selCat:cat?cat.parentId:null,memoEditing:false});};
  // Case info edit
  const editCaseInfoBtn=document.getElementById('editCaseInfoBtn');
  if(editCaseInfoBtn) editCaseInfoBtn.onclick=()=>setState({showCaseInfoEdit:true});
  const closeCaseInfo=document.getElementById('closeCaseInfo');
  if(closeCaseInfo) closeCaseInfo.onclick=()=>setState({showCaseInfoEdit:false});
  const closeCaseInfo2=document.getElementById('closeCaseInfo2');
  if(closeCaseInfo2) closeCaseInfo2.onclick=()=>setState({showCaseInfoEdit:false});
  const caseInfoOverlay=document.getElementById('caseInfoOverlay');
  if(caseInfoOverlay) caseInfoOverlay.onclick=(e)=>{if(e.target===caseInfoOverlay)setState({showCaseInfoEdit:false});};
  const saveCaseInfo=document.getElementById('saveCaseInfo');
  if(saveCaseInfo) saveCaseInfo.onclick=()=>{
    const catId=state.caseSummary;
    DA.updateCat(catId,{
      name:document.getElementById('ci_name').value.trim()||'(이름없음)',
      caseStatus:document.getElementById('ci_status').value,
      casePeriod:document.getElementById('ci_period').value,
      caseManager:document.getElementById('ci_manager').value,
      caseLawFirm:document.getElementById('ci_lawFirm').value,
      caseSummary:document.getElementById('ci_summary').value,
    });
    toast('사건 정보가 저장되었습니다.');
    setState({showCaseInfoEdit:false});
  };
  // Case Notes
  const acnb=document.getElementById('addCaseNoteBtn');if(acnb)acnb.onclick=()=>setState({addingNote:!state.addingNote,editingNoteId:null});
  const ccn=document.getElementById('cancelCaseNote');if(ccn)ccn.onclick=()=>setState({addingNote:false,editingNoteId:null});
  const scn=document.getElementById('saveCaseNote');
  if(scn)scn.onclick=()=>{
    const title=document.getElementById('caseNoteTitle').value||'메모';
    const content=document.getElementById('caseNoteContent').value;
    if(!content.trim()){toast('내용을 입력하세요.','error');return;}
    const docId=document.getElementById('caseNoteDoc').value;
    const pinned=document.getElementById('caseNotePinned').checked;
    const catId=state.caseSummary;
    if(state.editingNoteId){
      DA.updateCaseNote(state.editingNoteId,{title,content,pinned,docId:docId||null});
      toast('메모가 수정되었습니다.');
    } else {
      const fallbackDocId=DA.getDocs().filter(d=>d.catId===catId)[0]?.id||null;
      DA.addCaseNote({catId,docId:docId||fallbackDocId,title,content,pinned});
      toast('메모가 추가되었습니다.');
    }
    setState({addingNote:false,editingNoteId:null});
  };
  document.querySelectorAll('[data-edit-note]').forEach(el=>el.onclick=(e)=>{e.stopPropagation();setState({addingNote:true,editingNoteId:el.dataset.editNote});});
  document.querySelectorAll('[data-delete-note]').forEach(el=>el.onclick=(e)=>{e.stopPropagation();
    setState({showConfirm:{title:'메모 삭제',message:'이 메모를 삭제하시겠습니까?',onConfirm:()=>{DA.deleteCaseNote(el.dataset.deleteNote);toast('메모가 삭제되었습니다.');setState({showConfirm:null});}}});
  });
  // AI
  const aiBtn=document.getElementById('aiSummaryBtn');if(aiBtn)aiBtn.onclick=()=>generateAISummary(state.caseSummary);
  const chatSend=document.getElementById('chatSendBtn');const chatInput=document.getElementById('chatInput');
  if(chatSend&&chatInput){
    const doSend=()=>{const msg=chatInput.value.trim();if(msg){chatInput.value='';sendChatMessage(state.caseSummary,msg);}};
    chatSend.onclick=doSend;chatInput.onkeydown=(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}};
  }
  document.querySelectorAll('.chat-suggest').forEach(el=>el.onclick=()=>sendChatMessage(state.caseSummary,el.textContent.trim()));
  // Azure config
  const saveAz=document.getElementById('saveAzConfig');
  if(saveAz)saveAz.onclick=()=>{const endpoint=document.getElementById('azEndpoint').value.trim();const deploymentName=document.getElementById('azDeployment').value.trim();const apiKey=document.getElementById('azApiKey').value.trim();
    if(!endpoint||!deploymentName||!apiKey){toast('모든 필드를 입력해주세요.','error');return;}DA.setAzConfig({endpoint,deploymentName,apiKey});toast('AI 설정이 저장되었습니다.');setState({});};
  const testAz=document.getElementById('testAzConfig');
  if(testAz)testAz.onclick=async()=>{const r=document.getElementById('apiTestResult');r.innerHTML='<div class="info-box blue" style="margin-top:8px">연결 테스트 중...</div>';
    try{const text=await callAzureAI('"연결 성공"이라고만 답해주세요.',20);r.innerHTML=`<div class="info-box green" style="margin-top:8px">연결 성공: ${esc(text)}</div>`;}
    catch(e){r.innerHTML=`<div class="info-box" style="margin-top:8px;background:#fef2f2;border:1px solid #fecaca;color:#dc2626">연결 실패: ${esc(e.message)}</div>`;}};
  const clearAz=document.getElementById('clearAzConfig');
  if(clearAz)clearAz.onclick=()=>{DA.clearAzConfig();toast('AI 설정이 삭제되었습니다.');setState({});};
}

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
DA.seedIfEmpty();
render();
</script>
</body>
</html>
