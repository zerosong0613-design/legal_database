// ============ HELPERS ============
function fmt(b){if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';return (b/1048576).toFixed(1)+' MB';}
function fdate(s){const d=new Date(s);return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';}
function fdatetime(s){const d=new Date(s);return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function ficon(e){return {pdf:'PDF',docx:'DOC',doc:'DOC',xlsx:'XLS',pptx:'PPT',hwp:'HWP'}[e]||'FILE';}
function fcolor(e){return {pdf:'#dc2626',docx:'#2563eb',doc:'#2563eb',xlsx:'#16a34a',pptx:'#ea580c',hwp:'#0891b2'}[e]||'#6b7280';}
function catName(id){return (CATEGORIES.find(c=>c.id===id)||{}).name||'미분류';}
function getTags(ids){return ids.map(id=>TAGS.find(t=>t.id===id)).filter(Boolean);}
function confBadge(c){const m={public:{bg:'#dcfce7',c:'#16a34a',l:'공개'},internal:{bg:'#e0e7ff',c:'#4f46e5',l:'사내'},confidential:{bg:'#fee2e2',c:'#dc2626',l:'기밀'}};const v=m[c]||m.internal;return `<span class="badge" style="background:${v.bg};color:${v.c}">${v.l}</span>`;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ============ STATE ============
let state = { page:'dashboard', search:'', selCat:null, selTag:null, selDoc:null, addingNote:false, settingsTab:'sharepoint', spConnected:false, expandedCats:{} };
// Auto-expand root categories
CATEGORIES.filter(c=>!c.parentId).forEach(c=>state.expandedCats[c.id]=true);

// Clone notes so we can add new ones
let notes = [...NOTES];

function setState(patch){ Object.assign(state, patch); render(); }

// ============ RENDER ============
function render(){
  const app = document.getElementById('app');
  app.innerHTML = renderSidebar() + `<div class="main">${renderHeader()}<div class="content">${renderContent()}</div></div>` + (state.selDoc ? renderDetail() : '');
  bindEvents();
}

function renderSidebar(){
  const navItems = [
    {id:'dashboard',label:'대시보드',icon:'⊞'},
    {id:'documents',label:'문서 목록',icon:'📄'},
    {id:'search',label:'검색',icon:'🔍'},
    {id:'archive',label:'아카이브',icon:'📦'},
    {id:'settings',label:'설정',icon:'⚙'},
  ];
  const roots = CATEGORIES.filter(c=>!c.parentId);
  let catHtml = '';
  roots.forEach(r=>{
    const isExp = state.expandedCats[r.id];
    const isAct = state.selCat===r.id;
    catHtml += `<button class="cat-item${isAct?' active':''}" data-cat="${r.id}" data-toggle="${r.id}"><span>${esc(r.name)}</span><span class="count">${r.count}</span></button>`;
    if(isExp){
      const kids = CATEGORIES.filter(c=>c.parentId===r.id);
      kids.forEach(k=>{
        const kAct = state.selCat===k.id;
        catHtml += `<div class="cat-child"><button class="cat-item${kAct?' active':''}" data-cat="${k.id}"><span>${esc(k.name)}</span><span class="count">${k.count}</span></button></div>`;
      });
    }
  });

  return `<aside class="sidebar">
    <div class="logo"><div class="logo-icon">LG</div><span class="logo-text">법무 문서 DB</span></div>
    <nav class="nav">${navItems.map(n=>`<button class="nav-item${state.page===n.id?' active':''}" data-page="${n.id}">${n.icon} ${n.label}</button>`).join('')}</nav>
    <div class="cat-section"><div class="cat-label">카테고리</div>${catHtml}</div>
    <div class="sync-status"><div><span class="sync-dot"></span>동기화 상태: 정상</div><div>마지막 동기화: 2026.03.21 06:02</div></div>
  </aside>`;
}

function renderHeader(){
  const titles = {dashboard:'대시보드',documents:'문서 목록',search:'검색',archive:'아카이브',settings:'설정'};
  return `<header class="header">
    <h1>${titles[state.page]}</h1>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" value="${esc(state.search)}" placeholder="문서 제목, 내용, 태그로 검색...">
      </div>
      <div class="user-avatar">KM</div>
    </div>
  </header>`;
}

function getFilteredDocs(){
  let docs = DOCUMENTS;
  if(state.selCat) docs = docs.filter(d=>d.catId===state.selCat);
  if(state.selTag) docs = docs.filter(d=>d.tagIds.includes(state.selTag));
  if(state.page==='archive') docs = docs.filter(d=>d.status==='archived');
  else if(state.page!=='search') docs = docs.filter(d=>d.status==='active');
  if(state.search){
    const q=state.search.toLowerCase();
    docs=docs.filter(d=>d.title.toLowerCase().includes(q)||d.fileName.toLowerCase().includes(q)||d.parties.some(p=>p.toLowerCase().includes(q))||getTags(d.tagIds).some(t=>t.name.toLowerCase().includes(q)));
  }
  return docs;
}

function renderContent(){
  if(state.page==='dashboard') return renderDashboard();
  if(state.page==='settings') return renderSettings();
  return renderDocList();
}

function renderDashboard(){
  const active=DOCUMENTS.filter(d=>d.status==='active').length;
  const totalNotes=DOCUMENTS.reduce((s,d)=>s+d.noteCount,0);
  const roots=CATEGORIES.filter(c=>!c.parentId);
  const recent=DOCUMENTS.filter(d=>d.status==='active').slice(0,5);

  return `<div class="stats-grid">
    <div class="stat-card"><div class="label">전체 문서</div><div class="value" style="color:#3b82f6">${DOCUMENTS.length}</div></div>

    <div class="stat-card"><div class="label">작성된 메모</div><div class="value" style="color:#8b5cf6">${totalNotes}</div></div>

  </div>
  <div class="two-col">
    <div class="card"><h3>카테고리별 문서 현황</h3>${roots.map(r=>`<div class="bar-row"><div class="bar-label"><span style="color:#475569">${esc(r.name)}</span><span>${r.count}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(r.count/20)*100}%"></div></div></div>`).join('')}</div>
    <div class="card"><h3>동기화 상태</h3>
      <div class="sync-box"><div class="sync-title"><span class="sync-dot"></span>정상 동기화됨</div><div style="font-size:12px;color:#64748b">마지막 동기화: 2026.03.21 06:02</div></div>
      <div class="sync-mini-grid"><div class="sync-mini"><div class="num">3</div><div class="txt">신규 파일</div></div><div class="sync-mini"><div class="num" style="color:#8b5cf6">7</div><div class="txt">수정 파일</div></div></div>
      <button class="btn-primary-lg" style="width:100%;margin-top:16px">수동 동기화 시작</button>
    </div>
  </div>
  <div class="card"><h3>최근 등록 문서</h3>${recent.map(d=>{
    const tags=getTags(d.tagIds);
    return `<div class="recent-item"><div style="display:flex;align-items:center;gap:10px"><span class="title">${esc(d.title)}</span>${tags.slice(0,2).map(t=>`<span class="tag" style="background:${t.color}18;color:${t.color}">${esc(t.name)}</span>`).join('')}</div><span class="date">${fdatetime(d.created)}</span></div>`;
  }).join('')}</div>`;
}

function renderDocList(){
  const docs=getFilteredDocs();
  const tagBtns=TAGS.map(t=>{
    const isAct=state.selTag===t.id;
    return `<button class="tag-btn${isAct?' active':''}" data-tag="${t.id}" style="${isAct?`border-color:${t.color};background:${t.color}18;color:${t.color}`:''}">${esc(t.name)}</button>`;
  }).join('');

  const rows=docs.map(d=>{
    const tags=getTags(d.tagIds);
    const c=fcolor(d.ext);
    return `<tr data-doc="${d.id}">
      <td><div class="doc-title-cell"><div class="file-icon" style="background:${c}15;color:${c}">${ficon(d.ext)}</div><div><div class="doc-title">${esc(d.title)}</div><div class="doc-tags">${tags.map(t=>`<span class="tag" style="background:${t.color}18;color:${t.color}">${esc(t.name)}</span>`).join('')}</div></div></div></td>
      <td style="font-size:12px;color:#64748b;text-transform:uppercase">.${d.ext}</td>
      <td style="font-size:12px;color:#475569">${catName(d.catId)}</td>
      <td style="font-size:12px;color:#475569">${fdate(d.date)}</td>
      <td style="font-size:12px;color:#94a3b8">${fmt(d.size)}</td>
      <td>${d.noteCount>0?`<span class="note-count">💬 ${d.noteCount}</span>`:`<span style="font-size:12px;color:#cbd5e1">-</span>`}</td>
      <td>${confBadge(d.conf)}</td>
    </tr>`;
  }).join('');

  return `<div class="filter-bar">
    <span class="label">태그:</span>
    <button class="tag-btn${!state.selTag?' active':''}" data-tag="">전체</button>
    ${tagBtns}
    <span class="filter-count">${docs.length}건</span>
  </div>
  <table class="doc-table"><thead><tr><th>문서명</th><th style="width:80px">유형</th><th style="width:130px">카테고리</th><th style="width:120px">문서 일자</th><th style="width:80px">크기</th><th style="width:70px">메모</th><th style="width:90px">기밀등급</th></tr></thead><tbody>${rows}</tbody></table>
  ${docs.length===0?'<div class="empty-msg">검색 결과가 없습니다</div>':''}`;
}

function renderDetail(){
  const d=state.selDoc;
  const tags=getTags(d.tagIds);
  const docNotes=notes.filter(n=>n.docId===d.id);
  const pinned=docNotes.filter(n=>n.pinned);

    <div class="note-head"><div style="display:flex;align-items:center;gap:8px">${pin?'⭐ ':''}<span class="note-title">${esc(n.title)}</span></div><span class="note-date">${fdatetime(n.date)}</span></div>
    <div class="note-body">${esc(n.content)}</div>
    <div class="note-author">작성자: ${esc(n.author)}</div>
  </div>`).join('');

  const noteForm=state.addingNote?`<div class="note-form">
    <input type="text" id="noteTitle" placeholder="메모 제목">
    <textarea id="noteContent" rows="4" placeholder="핵심 내용을 메모하세요..."></textarea>
    <div class="actions"><button class="btn-secondary" id="cancelNote">취소</button><button class="btn-primary" id="saveNote">저장</button></div>

  return `<div class="overlay" id="overlay"></div>
  <div class="detail-panel">
    <div class="detail-header">
      <div style="display:flex;align-items:flex-start;gap:16px">
        <button class="close-btn" id="closeDetail">✕</button>

            <div class="file-icon" style="width:40px;height:40px;border-radius:10px;background:${c}15;color:${c};font-size:12px">${ficon(d.ext)}</div>
            <div><h2 style="font-size:16px;font-weight:700">${esc(d.title)}</h2><span style="font-size:12px;color:#94a3b8">${esc(d.fileName)}</span></div>
          </div>
          <div class="doc-tags">${tags.map(t=>`<span class="tag" style="background:${t.color}18;color:${t.color};font-size:11px;padding:2px 8px">${esc(t.name)}</span>`).join('')}</div>
        </div>
      </div>
    </div>
    <div class="detail-info">
      <div class="info-grid">
        <div class="info-item"><div class="il">카테고리</div><div class="iv">${catName(d.catId)}</div></div>
        <div class="info-item"><div class="il">문서 일자</div><div class="iv">${fdate(d.date)}</div></div>
        <div class="info-item"><div class="il">파일 크기</div><div class="iv">${fmt(d.size)}</div></div>
        <div class="info-item"><div class="il">기밀등급</div><div class="iv">${d.conf==='confidential'?'기밀':d.conf==='internal'?'사내':'공개'}</div></div>
        ${d.parties.length?`<div class="info-item"><div class="il">관련 당사자</div><div class="iv">${esc(d.parties.join(', '))}</div></div>`:''}
        <div class="info-item"><div class="il">SharePoint 경로</div><div class="iv">${esc(d.spPath)}</div></div>
      </div>
      <button class="sp-btn">🔗 SharePoint에서 열기</button>
    </div>
    <div class="notes-section">
      <div class="notes-header"><h3>메모 (${docNotes.length})</h3><button class="btn-primary" id="addNoteBtn">+ 메모 추가</button></div>
      ${noteForm}
      ${noteCards(pinned,true)}
      ${noteCards(others,false)}
      ${docNotes.length===0&&!state.addingNote?'<div style="text-align:center;padding:32px;color:#94a3b8;font-size:13px">아직 메모가 없습니다. 첫 메모를 추가해보세요.</div>':''}
    </div>
  </div>`;
}

  return `<div class="tabs">${tabBtns}</div>${body}`;

function renderFolderTree(){
  const folders=[
    {name:'법무',depth:0,selected:true,hasKids:true},
    {name:'2026',depth:1,hasKids:true},
    {name:'CP사건 (공정거래)',depth:2},
    {name:'M&A건 (DEF인수)',depth:2},
    {name:'노동소송건',depth:2},
    {name:'2025',depth:1,hasKids:true},
    {name:'XYZ 특허소송',depth:2},
    {name:'NDA/비밀유지',depth:2},
    {name:'본사 임대차',depth:2},
    {name:'JKL 원자재 공급건',depth:2},
    {name:'ABC 라이선스건',depth:2},
    {name:'2024',depth:1,hasKids:true},
    {name:'사업자등록 갱신',depth:2},
    {name:'내부통제 정비',depth:2},
    {name:'이사회자료',depth:1,hasKids:true},
    {name:'2026 이사회',depth:2},
    {name:'2025 이사회',depth:2},
    {name:'2024 이사회',depth:2},
    {name:'규정',depth:1},
  ];
  return folders.map(f=>{
    const pad=f.depth*20+8;
    const sel=f.selected?'selected':'';
    const arrow=f.hasKids?'▸':'';
    const icon=f.selected?'📁':'📂';
    return `<div class="folder-node ${sel}" style="padding-left:${pad}px"><span style="width:14px;font-size:10px">${arrow}</span> ${icon} ${esc(f.name)}${f.selected?'<span class="root-badge">루트</span>':''}</div>`;
  }).join('');
}

// ============ EVENTS ============
function bindEvents(){
  // Nav
  document.querySelectorAll('.nav-item[data-page]').forEach(el=>el.onclick=()=>{
    setState({page:el.dataset.page,selCat:null,selTag:null,selDoc:null,search:'',addingNote:false});
  });
  // Category
  document.querySelectorAll('.cat-item[data-cat]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.cat;
    const toggle=el.dataset.toggle;
    if(toggle){
      state.expandedCats[toggle]=!state.expandedCats[toggle];
    }
    setState({selCat:state.selCat===id?null:id, page:state.page==='dashboard'?'documents':state.page});
  });
  // Search
  const si=document.getElementById('searchInput');
  if(si) si.oninput=()=>{
    const q=si.value;
    setState({search:q, page:q&&state.page==='dashboard'?'documents':state.page});
  };
  // Tags filter
  document.querySelectorAll('.tag-btn[data-tag]').forEach(el=>el.onclick=()=>{
    const t=el.dataset.tag;
    setState({selTag:t||null});
  });
  // Doc rows
  document.querySelectorAll('tr[data-doc]').forEach(el=>el.onclick=()=>{
    const doc=DOCUMENTS.find(d=>d.id===el.dataset.doc);
    if(doc) setState({selDoc:doc,addingNote:false});
  });
  // Close detail
  const ov=document.getElementById('overlay');
  if(ov) ov.onclick=()=>setState({selDoc:null,addingNote:false});
  const cb=document.getElementById('closeDetail');
  if(cb) cb.onclick=()=>setState({selDoc:null,addingNote:false});
  // Add note
  const anb=document.getElementById('addNoteBtn');
  if(anb) anb.onclick=()=>setState({addingNote:!state.addingNote});
  const cn=document.getElementById('cancelNote');
  if(cn) cn.onclick=()=>setState({addingNote:false});
  const sn=document.getElementById('saveNote');
  if(sn) sn.onclick=()=>{
    const t=document.getElementById('noteTitle').value||'메모';
    const c=document.getElementById('noteContent').value;
    if(!c.trim())return;
    notes.unshift({id:'n-'+Date.now(),docId:state.selDoc.id,author:'김법무',title:t,content:c,pinned:false,date:new Date().toISOString()});
    state.selDoc.noteCount++;
    setState({addingNote:false});
  };
  // Settings tabs
  document.querySelectorAll('.tab-btn[data-stab]').forEach(el=>el.onclick=()=>{
    setState({settingsTab:el.dataset.stab});
  });
  // Connect button
  const conBtn=document.getElementById('connectBtn');
  if(conBtn) conBtn.onclick=()=>{
    conBtn.textContent='연결 중...';
    conBtn.disabled=true;
    setTimeout(()=>setState({spConnected:true}),1000);
  };
}

// ============ INIT ============
render();
</script>
</body>
</html>
