function fmt(b){if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';return (b/1048576).toFixed(1)+' MB';}
function fdate(s){const d=new Date(s);return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';}
function fdatetime(s){const d=new Date(s);return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function ficon(e){return {pdf:'PDF',docx:'DOC',doc:'DOC',xlsx:'XLS',pptx:'PPT',hwp:'HWP'}[e]||'FILE';}
function fcolor(e){return {pdf:'#dc2626',docx:'#2563eb',doc:'#2563eb',xlsx:'#16a34a',pptx:'#ea580c',hwp:'#0891b2'}[e]||'#6b7280';}
function catName(id){return (CATEGORIES.find(c=>c.id===id)||{}).name||'미분류';}
function getTags(ids){return ids.map(id=>TAGS.find(t=>t.id===id)).filter(Boolean);}
function confBadge(c){const m={public:{bg:'#dcfce7',c:'#16a34a',l:'공개'},internal:{bg:'#e0e7ff',c:'#4f46e5',l:'사내'},confidential:{bg:'#fee2e2',c:'#dc2626',l:'기밀'}};const v=m[c]||m.internal;return `<span class="badge" style="background:${v.bg};color:${v.c}">${v.l}</span>`;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

async function generateAISummary(catId){
  const apiKey=getApiKey();
  if(!apiKey){ alert('설정 > AI 연동 탭에서 OpenAI API 키를 먼저 입력해주세요.'); return; }

  const cat=CATEGORIES.find(c=>c.id===catId);
  const docs=DOCUMENTS.filter(d=>d.catId===catId).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const caseNotes=[];
  docs.forEach(d=>{
    notes.filter(n=>n.docId===d.id).forEach(n=>caseNotes.push({docTitle:d.title, title:n.title, content:n.content, pinned:n.pinned}));
  });

  const prompt=`당신은 기업 법무팀의 법률 문서 분석 전문가입니다.
아래 사건의 문서 목록과 메모를 분석하여 사건 요약을 생성해주세요.

## 사건명: ${cat.name}

## 문서 목록 (시간순):
${docs.map(d=>`- [${d.date}] ${d.title} (${d.parties.join(', ')||'내부문서'})
  본문키워드: ${d.body||'없음'}`).join('\n')}

## 작성된 메모:
${caseNotes.length>0?caseNotes.map(n=>`- [${n.pinned?'고정':'일반'}] ${n.title}: ${n.content}`).join('\n'):'메모 없음'}

## 출력 형식 (반드시 아래 JSON 형식으로만 응답):
{
  "summary": "사건 전체 경과와 현재 상태를 3~5문장으로 요약",
  "status": "진행중/완료/검토중/만료예정 중 하나",
  "keyIssues": ["핵심 이슈 1", "핵심 이슈 2", "핵심 이슈 3"],
  "nextActions": ["다음 조치사항 1", "다음 조치사항 2"],
  "riskLevel": "높음/중간/낮음"
}`;

  state.aiLoading=true;
  render();

  try{
    const res=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({
        model:'gpt-4o-mini',
        messages:[{role:'user',content:prompt}],
        temperature:0.3,
        max_tokens:1000,
      })
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error?.message||'API 호출 실패 ('+res.status+')');
    }
    const data=await res.json();
    const text=data.choices[0].message.content;
    // JSON 파싱 (코드블록 제거)
    const jsonStr=text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    const result=JSON.parse(jsonStr);
    aiSummaries[catId]=result;
    state.aiLoading=false;
    render();
  }catch(e){
    state.aiLoading=false;
    render();
    alert('AI 요약 생성 실패: '+e.message);
  }
}

function buildCaseContext(catId){
  const cat=CATEGORIES.find(c=>c.id===catId);

작성된 메모:
${caseNotes.length>0?caseNotes.map(n=>`- [${n.docTitle}] ${n.title}: ${n.content}`).join('\n'):'메모 없음'}`;
}

async function sendChatMessage(catId, userMessage){
  const apiKey=getApiKey();
  if(!apiKey){ alert('설정 > AI 연동 탭에서 OpenAI API 키를 먼저 입력해주세요.'); return; }

  if(!chatHistories[catId]) chatHistories[catId]=[];
  chatHistories[catId].push({role:'user',content:userMessage});
  state.chatLoading=true;
  render();
  // 스크롤
  setTimeout(()=>{const el=document.getElementById('chatMessages');if(el)el.scrollTop=el.scrollHeight;},50);

  const systemPrompt=`당신은 기업 법무팀의 법률 자문 AI 어시스턴트입니다.
아래 사건의 문서 목록과 메모 내용을 기반으로 질문에 답변해주세요.
답변은 한국어로, 간결하고 실무적으로 해주세요. 문서에 없는 내용은 추측이라고 밝혀주세요.

${buildCaseContext(catId)}`;

  const messages=[
    {role:'system',content:systemPrompt},
    ...chatHistories[catId]
  ];

  try{
    const res=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model:'gpt-4o-mini',messages:messages,temperature:0.4,max_tokens:1500})
    });
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||'API 오류 '+res.status);}
    const data=await res.json();
    const reply=data.choices[0].message.content;
    chatHistories[catId].push({role:'assistant',content:reply});
    state.chatLoading=false;
    render();
    setTimeout(()=>{const el=document.getElementById('chatMessages');if(el)el.scrollTop=el.scrollHeight;},50);
  }catch(e){
    chatHistories[catId].pop(); // 실패 시 유저 메시지 제거
    state.chatLoading=false;
    render();
    alert('AI 응답 실패: '+e.message);
  }
}

function getFilteredDocs(){
  let docs = DOCUMENTS;
  if(state.selCat) docs = docs.filter(d=>d.catId===state.selCat);
  if(state.selTag) docs = docs.filter(d=>d.tagIds.includes(state.selTag));
  if(state.page==='archive') docs = docs.filter(d=>d.status==='archived');
  else if(state.page!=='search') docs = docs.filter(d=>d.status==='active');
  if(state.search){
    const q=state.search.toLowerCase();
    docs=docs.filter(d=>{
      // 제목, 파일명, 당사자, 태그
      if(d.title.toLowerCase().includes(q)) return true;
      if(d.fileName.toLowerCase().includes(q)) return true;
      if(d.parties.some(p=>p.toLowerCase().includes(q))) return true;
      if(getTags(d.tagIds).some(t=>t.name.toLowerCase().includes(q))) return true;
      // 문서 본문 검색
      if(d.body && d.body.toLowerCase().includes(q)) return true;
      // 메모 내용 검색
      if(notes.some(n=>n.docId===d.id && (n.content.toLowerCase().includes(q)||n.title.toLowerCase().includes(q)))) return true;
      return false;
    });
  }
  return docs;
}

function getSearchContext(doc, q){
  if(!q) return null;
  const ql=q.toLowerCase();
  // 본문에서 매치
  if(doc.body && doc.body.toLowerCase().includes(ql)){
    const idx=doc.body.toLowerCase().indexOf(ql);
    const start=Math.max(0,idx-20);
    const end=Math.min(doc.body.length,idx+q.length+40);
    const snippet=(start>0?'...':'')+doc.body.substring(start,end)+(end<doc.body.length?'...':'');
    return {type:'본문',text:snippet};
  }
  // 메모에서 매치
  const matchNote=notes.find(n=>n.docId===doc.id && (n.content.toLowerCase().includes(ql)||n.title.toLowerCase().includes(ql)));
  if(matchNote){
    const src=matchNote.content.toLowerCase().includes(ql)?matchNote.content:matchNote.title;
    const idx=src.toLowerCase().indexOf(ql);
    const start=Math.max(0,idx-20);
    const end=Math.min(src.length,idx+q.length+40);
    const snippet=(start>0?'...':'')+src.substring(start,end)+(end<src.length?'...':'');
    return {type:'메모: '+matchNote.title,text:snippet};
  }
  return null;
}

function highlightText(text, q){
  if(!q) return esc(text);
  const escaped=esc(text);
  const regex=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return escaped.replace(regex,'<span class="search-highlight">$1</span>');
}

      <td><div class="doc-title-cell"><div class="file-icon" style="background:${c}15;color:${c}">${ficon(d.ext)}</div><div><div class="doc-title">${titleHtml}</div><div class="doc-tags">${tags.map(t=>`<span class="tag" style="background:${t.color}18;color:${t.color}">${esc(t.name)}</span>`).join('')}</div>${ctx?`<div class="search-result-ctx"><strong>${esc(ctx.type)}</strong>: ${highlightText(ctx.text,state.search)}</div>`:''}</div></div></td>
      <td style="font-size:12px;color:#64748b;text-transform:uppercase">.${d.ext}</td>
      <td style="font-size:12px;color:#475569">${catName(d.catId)}</td>
      <td style="font-size:12px;color:#475569">${fdate(d.date)}</td>

      <td>${confBadge(d.conf)}</td>
    </tr>`;
  }).join('');

  return `<div class="filter-bar">
    <span class="label">태그:</span>
    <button class="tag-btn${!state.selTag?' active':''}" data-tag="">전체</button>
    ${tagBtns}
    <span class="filter-count">${docs.length}건</span>
  </div>
  <table class="doc-table"><thead><tr><th>문서명</th><th style="width:80px">유형</th><th style="width:130px">카테고리</th><th style="width:120px">문서 일자</th><th style="width:80px">크기</th><th style="width:70px">메모</th><th style="width:90px">기밀등급</th></tr></thead><tbody>${rows}</tbody></table>
  ${docs.length===0?'<div class="empty-msg">검색 결과가 없습니다</div>':''}`;
}

function renderCaseSummary(){
  const catId=state.caseSummary;

  if(!cat) return '<div class="empty-msg">카테고리를 찾을 수 없습니다.</div>';

  const docs=DOCUMENTS.filter(d=>d.catId===catId).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const caseNotes=[];
  docs.forEach(d=>{
    notes.filter(n=>n.docId===d.id).forEach(n=>caseNotes.push({...n, docTitle:d.title}));
  });
  const pinnedNotes=caseNotes.filter(n=>n.pinned);

  // 부모 카테고리
  const parent=CATEGORIES.find(c=>c.id===cat.parentId);

  // AI 요약 또는 하드코딩 또는 자동구성
  const ai=aiSummaries[catId];
  const cs=CASE_SUMMARIES[catId];

  // 자동 구성 기본값
  const firstDate=docs.length?docs[0].date:'';
  const lastDate=docs.length?docs[docs.length-1].date:'';
  const autoParties=[...new Set(docs.flatMap(d=>d.parties).filter(p=>p!=='당사'))];
  const autoLawFirms=autoParties.filter(p=>p.includes('법무법인'));

  // 상태 결정
  const statusColors={진행중:'#d97706',완료:'#16a34a',검토중:'#d97706',만료예정:'#ea580c',높음:'#dc2626',중간:'#d97706',낮음:'#16a34a'};

  // AI 결과 우선, 없으면 하드코딩, 없으면 자동구성

  const nextActions=ai?ai.nextActions:[];

        </div>
      `).join('')}
      ${state.chatLoading?'<div style="display:flex;gap:10px;margin-bottom:12px"><div style="min-width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700">AI</div><div style="padding:10px 14px;border-radius:12px 12px 12px 2px;background:#f1f5f9;font-size:13px;color:#94a3b8">답변을 생성하고 있습니다...</div></div>':''}
    </div>
    ${!(chatHistories[catId]||[]).length&&!state.chatLoading?`
      <div style="padding:16px;text-align:center;color:#94a3b8;font-size:13px;margin-bottom:12px">

          <button class="chat-suggest" style="padding:5px 12px;border:1px solid #e2e8f0;border-radius:16px;background:#fff;font-size:12px;color:#475569;cursor:pointer">현재까지 진행 경과를 정리해줘</button>

          <button class="chat-suggest" style="padding:5px 12px;border:1px solid #e2e8f0;border-radius:16px;background:#fff;font-size:12px;color:#475569;cursor:pointer">손해배상 관련 조항 정리</button>

function renderDetail(){

          <div class="doc-tags">${tags.map(t=>`<span class="tag" style="background:${t.color}18;color:${t.color};font-size:11px;padding:2px 8px">${esc(t.name)}</span>`).join('')}</div>

    body=`<div class="section"><h3>OpenAI API 연동</h3>

        <div class="form-field"><label>모델</label><select id="aiModelSelect"><option value="gpt-4o-mini" selected>GPT-4o Mini (빠름, 저비용)</option><option value="gpt-4o">GPT-4o (고품질)</option><option value="gpt-3.5-turbo">GPT-3.5 Turbo (최저비용)</option></select></div>

      <div style="display:flex;gap:12px;margin-top:16px">

        ${savedKey?`<button class="btn-secondary-lg" id="testApiKey" style="margin:0">연결 테스트</button>`:''}
        ${savedKey?`<button class="btn-secondary-lg" id="clearApiKey" style="margin:0;color:#dc2626;border-color:#fecaca">키 삭제</button>`:''}
      </div>
      <div id="apiTestResult"></div>
    </div>
    <div class="section"><h3>AI 요약 사용 방법</h3>
      <div class="step-grid">
        <div class="step-card"><div class="step-num">1</div><div class="st">API 키 입력</div><div class="sd">OpenAI에서 발급받은 API 키를 위에 입력하고 저장합니다. 키는 브라우저 로컬 스토리지에 저장됩니다.</div></div>
        <div class="step-card"><div class="step-num">2</div><div class="st">사건 요약 페이지 이동</div><div class="sd">사이드바에서 사건(하위 카테고리)을 클릭하면 사건 요약 페이지로 이동합니다.</div></div>
        <div class="step-card"><div class="step-num">3</div><div class="st">AI 요약 생성</div><div class="sd">"✨ AI 요약 생성" 버튼을 클릭하면 해당 사건의 문서와 메모를 분석하여 사건 요약, 핵심 이슈, 다음 조치사항을 자동 생성합니다.</div></div>
      </div>
      <div class="info-box blue" style="margin-top:16px"><strong>비용 안내:</strong> GPT-4o Mini 기준 사건 1건 요약 시 약 $0.01 미만 소요됩니다.<br><strong>보안 참고:</strong> 문서 본문 키워드와 메모 내용이 OpenAI API로 전송됩니다. 기밀 문서의 경우 사내 보안 정책을 확인하세요.<br>기업 환경에서는 Azure OpenAI를 권장합니다 (데이터가 회사 Azure 테넌트 내에서만 처리).</div>
    </div>`;
  } else if(tab==='users'){
    body=`<div class="section"><h3>사용자 권한 관리</h3>
      <p style="font-size:13px;color:#64748b;margin-bottom:16px">Azure AD 그룹 기반으로 접근 권한이 관리됩니다.</p>
      <table class="user-table"><thead><tr><th>이름</th><th>이메일</th><th>부서</th><th>권한</th><th>마지막 접속</th></tr></thead><tbody>
        <tr><td>김법무</td><td style="color:#64748b;font-size:12px">km@company.com</td><td>법무팀</td><td><span class="badge" style="background:#fee2e2;color:#dc2626">관리자</span></td><td style="color:#94a3b8;font-size:12px">2026.03.21 09:30</td></tr>
        <tr><td>이대리</td><td style="color:#64748b;font-size:12px">lee@company.com</td><td>법무팀</td><td><span class="badge" style="background:#e0e7ff;color:#4f46e5">편집자</span></td><td style="color:#94a3b8;font-size:12px">2026.03.20 17:00</td></tr>
        <tr><td>박변호사</td><td style="color:#64748b;font-size:12px">park@company.com</td><td>법무팀</td><td><span class="badge" style="background:#e0e7ff;color:#4f46e5">편집자</span></td><td style="color:#94a3b8;font-size:12px">2026.03.19 14:20</td></tr>
        <tr><td>최과장</td><td style="color:#64748b;font-size:12px">choi@company.com</td><td>경영기획</td><td><span class="badge" style="background:#f1f5f9;color:#64748b">뷰어</span></td><td style="color:#94a3b8;font-size:12px">2026.03.18 10:15</td></tr>
      </tbody></table>
    </div>`;
  } else {
    body=`<div class="section"><h3>태그 관리</h3>
      <p style="font-size:13px;color:#64748b;margin-bottom:16px">문서에 부여할 태그를 관리합니다.</p>
      <div class="tag-list">${TAGS.map(t=>`<div class="tag-manage"><div class="dot" style="background:${t.color}"></div><span>${esc(t.name)}</span><button>×</button></div>`).join('')}</div>
      <div class="add-tag-row"><input type="text" placeholder="새 태그 이름"><input type="color" value="#6366f1"><button class="btn-primary-lg" style="margin:0">추가</button></div>
    </div>`;
  }
  return `<div class="tabs">${tabBtns}</div>${body}`;
}

function renderFolderTree(){
  const folders=[
    {name:'법무',depth:0,selected:true,hasKids:true},
    {name:'2026',depth:1,hasKids:true},
    {name:'CP사건 (공정거래)',depth:2},
    {name:'M&A건 (DEF인수)',depth:2},
    {name:'노동소송건',depth:2},
    {name:'2025',depth:1,hasKids:true},
    {name:'XYZ 특허소송',depth:2},
    {name:'NDA/비밀유지',depth:2},
    {name:'본사 임대차',depth:2},
    {name:'JKL 원자재 공급건',depth:2},
    {name:'ABC 라이선스건',depth:2},
    {name:'2024',depth:1,hasKids:true},
    {name:'사업자등록 갱신',depth:2},
    {name:'내부통제 정비',depth:2},
    {name:'이사회자료',depth:1,hasKids:true},
    {name:'2026 이사회',depth:2},
    {name:'2025 이사회',depth:2},
    {name:'2024 이사회',depth:2},
    {name:'규정',depth:1},
  ];
  return folders.map(f=>{
    const pad=f.depth*20+8;
    const sel=f.selected?'selected':'';
    const arrow=f.hasKids?'▸':'';
    const icon=f.selected?'📁':'📂';
    return `<div class="folder-node ${sel}" style="padding-left:${pad}px"><span style="width:14px;font-size:10px">${arrow}</span> ${icon} ${esc(f.name)}${f.selected?'<span class="root-badge">루트</span>':''}</div>`;
  }).join('');
}

// ============ EVENTS ============
function bindEvents(){
  // Nav
  document.querySelectorAll('.nav-item[data-page]').forEach(el=>el.onclick=()=>{
    setState({page:el.dataset.page,selCat:null,selTag:null,selDoc:null,search:'',addingNote:false,caseSummary:null});
  });
  // Category
  document.querySelectorAll('.cat-item[data-cat]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.cat;
    const toggle=el.dataset.toggle;
    if(toggle){
      state.expandedCats[toggle]=!state.expandedCats[toggle];
    }
    // 하위 카테고리 클릭 시 사건 요약 페이지 진입
    const cat=CATEGORIES.find(c=>c.id===id);
    if(cat && cat.parentId && CASE_SUMMARIES[id]){
      setState({selCat:id, caseSummary:id, page:'documents', selDoc:null});
    } else {
      setState({selCat:state.selCat===id?null:id, caseSummary:null, page:state.page==='dashboard'?'documents':state.page});
    }
  });
  // Search
  const si=document.getElementById('searchInput');
  if(si) si.oninput=()=>{
    const q=si.value;
    setState({search:q, page:q&&state.page==='dashboard'?'documents':state.page});
  };
  // Tags filter
  document.querySelectorAll('.tag-btn[data-tag]').forEach(el=>el.onclick=()=>{
    const t=el.dataset.tag;
    setState({selTag:t||null});
  });
  // Doc rows
  document.querySelectorAll('tr[data-doc]').forEach(el=>el.onclick=()=>{
    const doc=DOCUMENTS.find(d=>d.id===el.dataset.doc);
    if(doc) setState({selDoc:doc,addingNote:false});
  });
  // Close detail
  const ov=document.getElementById('overlay');
  if(ov) ov.onclick=()=>setState({selDoc:null,addingNote:false});
  const cb=document.getElementById('closeDetail');
  if(cb) cb.onclick=()=>setState({selDoc:null,addingNote:false});
  // Add note
  const anb=document.getElementById('addNoteBtn');
  if(anb) anb.onclick=()=>setState({addingNote:!state.addingNote});
  const cn=document.getElementById('cancelNote');
  if(cn) cn.onclick=()=>setState({addingNote:false});
  const sn=document.getElementById('saveNote');
  if(sn) sn.onclick=()=>{
    const t=document.getElementById('noteTitle').value||'메모';
    const c=document.getElementById('noteContent').value;
    if(!c.trim())return;
    notes.unshift({id:'n-'+Date.now(),docId:state.selDoc.id,author:'김법무',title:t,content:c,pinned:false,date:new Date().toISOString()});
    state.selDoc.noteCount++;
    setState({addingNote:false});
  };
  // Settings tabs
  document.querySelectorAll('.tab-btn[data-stab]').forEach(el=>el.onclick=()=>{
    setState({settingsTab:el.dataset.stab});
  });
  // Connect button
  const conBtn=document.getElementById('connectBtn');
  if(conBtn) conBtn.onclick=()=>{
    conBtn.textContent='연결 중...';
    conBtn.disabled=true;
    setTimeout(()=>setState({spConnected:true}),1000);
  };
  // Back from case summary
  const backBtn=document.getElementById('backFromCase');
  if(backBtn) backBtn.onclick=()=>{
    const cat=CATEGORIES.find(c=>c.id===state.caseSummary);
    setState({caseSummary:null, selCat:cat?cat.parentId:null, addingNote:false});
  };
  // Case note add/save
  const acnb=document.getElementById('addCaseNoteBtn');
  if(acnb) acnb.onclick=()=>setState({addingNote:!state.addingNote});
  const ccn=document.getElementById('cancelCaseNote');
  if(ccn) ccn.onclick=()=>setState({addingNote:false});
  const scn=document.getElementById('saveCaseNote');
  if(scn) scn.onclick=()=>{
    const title=document.getElementById('caseNoteTitle').value||'메모';
    const content=document.getElementById('caseNoteContent').value;
    if(!content.trim()) return;
    const selDocId=document.getElementById('caseNoteDoc').value;
    const pinned=document.getElementById('caseNotePinned').checked;
    // 문서를 선택했으면 해당 문서에, 아니면 사건의 첫 번째 문서에 연결
    const catId=state.caseSummary;
    const caseDocs=DOCUMENTS.filter(d=>d.catId===catId);
    const docId=selDocId||( caseDocs.length>0?caseDocs[0].id:null);
    if(!docId) return;
    notes.unshift({id:'n-'+Date.now(),docId:docId,author:'김법무',title:title,content:content,pinned:pinned,date:new Date().toISOString()});
    const doc=DOCUMENTS.find(d=>d.id===docId);
    if(doc) doc.noteCount++;
    setState({addingNote:false});
  };
  // Timeline doc click
  document.querySelectorAll('.tl-card[data-doc]').forEach(el=>el.onclick=()=>{
    const doc=DOCUMENTS.find(d=>d.id===el.dataset.doc);
    if(doc) setState({selDoc:doc,addingNote:false});
  });
  // AI Summary button
  const aiBtn=document.getElementById('aiSummaryBtn');
  if(aiBtn) aiBtn.onclick=()=>generateAISummary(state.caseSummary);
  // Chat send
  const chatSend=document.getElementById('chatSendBtn');
  const chatInput=document.getElementById('chatInput');
  if(chatSend&&chatInput){
    const doSend=()=>{const msg=chatInput.value.trim();if(msg){sendChatMessage(state.caseSummary,msg);}};
    chatSend.onclick=doSend;
    chatInput.onkeydown=(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}};
  }
  // Chat suggest buttons
  document.querySelectorAll('.chat-suggest').forEach(el=>el.onclick=()=>{
    sendChatMessage(state.caseSummary,el.textContent);
  });
  // API key save
  const saveKey=document.getElementById('saveApiKey');
  if(saveKey) saveKey.onclick=()=>{
    const key=document.getElementById('apiKeyInput').value.trim();
    if(!key){alert('API 키를 입력해주세요.');return;}
    setApiKey(key);
    setState({});
  };
  // API key test
  const testKey=document.getElementById('testApiKey');
  if(testKey) testKey.onclick=async()=>{
    const resultEl=document.getElementById('apiTestResult');
    resultEl.innerHTML='<div class="info-box blue" style="margin-top:12px">테스트 중...</div>';
    try{
      const res=await fetch('https://api.openai.com/v1/models',{headers:{'Authorization':'Bearer '+getApiKey()}});
      if(res.ok) resultEl.innerHTML='<div class="info-box green" style="margin-top:12px">✅ API 연결 성공! 정상적으로 사용할 수 있습니다.</div>';
      else{const e=await res.json().catch(()=>({}));resultEl.innerHTML='<div class="info-box" style="margin-top:12px;background:#fee2e2;border:1px solid #fecaca;color:#dc2626">❌ 연결 실패: '+(e.error?.message||res.status)+'</div>';}
    }catch(e){resultEl.innerHTML='<div class="info-box" style="margin-top:12px;background:#fee2e2;border:1px solid #fecaca;color:#dc2626">❌ 네트워크 오류: '+e.message+'</div>';}
  };
  // API key clear
  const clearKey=document.getElementById('clearApiKey');
  if(clearKey) clearKey.onclick=()=>{
    if(confirm('저장된 API 키를 삭제하시겠습니까?')){localStorage.removeItem('openai_api_key');setState({});}
  };
}

// ============ INIT ============
render();
</script>
